<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitster – Debug</title>

<!-- Supabase korrekt einbinden -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #020617;
  color: white;
  font-family: system-ui, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: #1f2937;
  padding: 2rem;
  border-radius: 16px;
  width: 360px;
  text-align: center;
}

input {
  width: 100%;
  padding: 0.6rem;
  margin-top: 1rem;
  border-radius: 6px;
  border: none;
}

button {
  margin-top: 1.5rem;
  padding: 0.7rem 1.4rem;
  border-radius: 999px;
  border: none;
  background: #2563eb;
  color: white;
  font-size: 1rem;
  cursor: pointer;
}

.debug {
  margin-top: 1rem;
  font-size: 0.85rem;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="card">
  <h2>🧪 Debug‑Check</h2>

  <input placeholder="Teamname (Test)">

  <button onclick="testSupabase()">Test Supabase</button>

  <div id="debug" class="debug">
    Seite geladen ✅
  </div>
</div>

<script>
function testSupabase() {
  const debug = document.getElementById("debug");

  if (!window.supabase) {
    debug.textContent = "❌ Supabase nicht geladen";
    return;
  }

  const client = window.supabase.createClient(
    "https://havaoqxnxnlmyfbldyic.supabase.co",
    "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
  );

  debug.textContent = "✅ Supabase geladen & Client erstellt";
}
</script>

</body>
</html>
