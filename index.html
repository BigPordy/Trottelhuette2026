<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitster – Live Spiel</title>

<!-- ✅ Supabase Client -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(180deg,#0f172a,#020617);
  color: white;
  font-family: system-ui, sans-serif;
}

/* Screens */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: 360px;
  background:#1f2937;
  border-radius:18px;
  padding:1.8rem;
  box-shadow: 0 20px 60px rgba(0,0,0,.45);
  text-align:center;
}

/* Form */
input {
  width:100%;
  padding:0.5rem;
  margin-top:0.75rem;
  border-radius:6px;
  border:none;
  font-size:1rem;
}

button {
  margin-top:1.2rem;
  padding:0.6rem 1.4rem;
  border-radius:999px;
  border:none;
  background:#2563eb;
  color:white;
  font-size:1.05rem;
  cursor:pointer;
}

button:active { transform:scale(0.98); }

.error {
  margin-top:0.6rem;
  color:#fca5a5;
  font-size:0.9rem;
}

.hint {
  margin-top:0.6rem;
  font-size:0.85rem;
  opacity:0.8;
}
</style>
</head>

<body>

<!-- STARTSCREEN -->
<div id="startScreen" class="screen">
  <div class="card">
    <h2>👥 Team anmelden</h2>

    <input id="teamNameInput" placeholder="Teamname eingeben">

    <button id="startBtn" type="button">Spiel starten</button>

    <div id="startError" class="error"></div>
  </div>
</div>

<!-- SPIELSCREEN -->
<div id="gameScreen" class="screen" style="display:none;">
  <div class="card">
    <h2>🎵 Runde 1 – Hitster</h2>
    <p>Interpret &amp; Songtitel eingeben</p>

    <!-- Antwortfelder -->
    <input id="artistInput" placeholder="Interpret">
    <input id="titleInput" placeholder="Songtitel">

    <button id="saveBtn" type="button">Antwort speichern</button>

    <div id="saveStatus" class="hint"></div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ✅ Supabase Client */
  const supabase = window.supabase.createClient(
    "https://havaoqxnxnlmyfbldyic.supabase.co",
    "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
  );

  // DOM
  const startScreen = document.getElementById("startScreen");
  const gameScreen  = document.getElementById("gameScreen");
  const teamInput   = document.getElementById("teamNameInput");
  const startBtn    = document.getElementById("startBtn");
  const startError  = document.getElementById("startError");

  const artistInput = document.getElementById("artistInput");
  const titleInput  = document.getElementById("titleInput");
  const saveBtn     = document.getElementById("saveBtn");
  const saveStatus  = document.getElementById("saveStatus");

  // State
  let teamId = null;

  /* ✅ Team anlegen */
  startBtn.addEventListener("click", async () => {
    startError.textContent = "";
    const name = teamInput.value.trim();

    if (!name) {
      startError.textContent = "Bitte Teamnamen eingeben";
      return;
    }

    const { data, error } = await supabase
      .from("teams")
      .insert({ name })
      .select()
      .single();

    if (error) {
      console.error(error);
      startError.textContent = "Fehler beim Start";
      return;
    }

    teamId = data.id;

    startScreen.style.display = "none";
    gameScreen.style.display  = "flex";
  });

  /* ✅ Antwort speichern (LIVE UPSERT) */
  saveBtn.addEventListener("click", async () => {
    if (!teamId) return;

    const payload = {
      team_id: teamId,
      round: 1,
      song: 1, // ✅ vorerst immer Song 1 (Navigation kommt danach)
      artist: artistInput.value.trim() || null,
      title:  titleInput.value.trim()  || null,
      movie:  null
    };

    const { error } = await supabase
      .from("answers")
      .upsert(payload, { onConflict: "team_id,round,song" });

    if (error) {
      console.error(error);
      saveStatus.textContent = "❌ Fehler beim Speichern";
      return;
    }

    // Felder leeren
    artistInput.value = "";
    titleInput.value  = "";

    saveStatus.textContent = "✅ Antwort live gespeichert (überschreibbar)";
  });

});
</script>

</body>
</html>
