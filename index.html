<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitster – Live Spiel</title>

<!-- ✅ Supabase Client -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(180deg,#0f172a,#020617);
  color: white;
  font-family: system-ui, sans-serif;
}

/* Screens */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: 360px;
  background:#1f2937;
  border-radius:18px;
  padding:1.8rem;
  box-shadow: 0 20px 60px rgba(0,0,0,.45);
  text-align:center;
}

/* Controls */
input {
  width:100%;
  padding:0.5rem;
  margin-top:0.75rem;
  border-radius:6px;
  border:none;
  font-size:1rem;
}

button {
  margin-top:1rem;
  padding:0.6rem 1.4rem;
  border-radius:999px;
  border:none;
  background:#2563eb;
  color:white;
  font-size:1rem;
  cursor:pointer;
}

.nav {
  display:flex;
  justify-content:space-between;
  gap:0.5rem;
  margin-top:0.75rem;
}

.hint {
  margin-top:0.6rem;
  font-size:0.8rem;
  opacity:0.8;
}
</style>
</head>

<body>

<!-- STARTSCREEN -->
<div id="startScreen" class="screen">
  <div class="card">
    <h2>👥 Team anmelden</h2>
    <input id="teamNameInput" placeholder="Teamname eingeben">
    <button id="startBtn" type="button">Spiel starten</button>
    <div id="startError" class="hint"></div>
  </div>
</div>

<!-- SPIELSCREEN -->
<div id="gameScreen" class="screen" style="display:none;">
  <div class="card">

    <!-- RUNDEN-BANNER -->
    <div class="nav">
      <button onclick="switchRound(0)">🎵 Runde 1</button>
      <button onclick="switchRound(1)">🎬 Runde 2</button>
    </div>

    <h2 id="roundTitle"></h2>
    <p id="songInfo"></p>

    <!-- ANTWORTEN -->
    <div id="round1Inputs">
      <input id="artistInput" placeholder="Interpret">
      <input id="titleInput" placeholder="Songtitel">
    </div>

    <div id="round2Inputs" style="display:none;">
      <input id="movieInput" placeholder="Filmtitel">
    </div>

    <button id="saveBtn" type="button">Antwort speichern</button>

    <!-- SONG NAVIGATION -->
    <div class="nav">
      <button onclick="prevSong()">⏮ Vorher</button>
      <button onclick="nextSong()">⏭ Nächster</button>
    </div>

    <div id="saveStatus" class="hint"></div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ✅ Supabase */
  const supabase = window.supabase.createClient(
    "https://havaoqxnxnlmyfbldyic.supabase.co",
    "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
  );

  /* UI */
  const startScreen = document.getElementById("startScreen");
  const gameScreen = document.getElementById("gameScreen");
  const startBtn = document.getElementById("startBtn");
  const teamNameInput = document.getElementById("teamNameInput");
  const startError = document.getElementById("startError");

  const roundTitle = document.getElementById("roundTitle");
  const songInfo = document.getElementById("songInfo");

  const round1Inputs = document.getElementById("round1Inputs");
  const round2Inputs = document.getElementById("round2Inputs");

  const artistInput = document.getElementById("artistInput");
  const titleInput = document.getElementById("titleInput");
  const movieInput = document.getElementById("movieInput");
  const saveStatus = document.getElementById("saveStatus");

  /* State */
  let teamId = null;
  let roundIndex = 0; // 0 = Runde 1, 1 = Runde 2
  let songIndex = 0;

  const songCounts = [15, 16]; // Runde 1 / Runde 2

  /* START GAME */
  startBtn.addEventListener("click", async () => {
    startError.textContent = "";
    const name = teamNameInput.value.trim();
    if (!name) {
      startError.textContent = "Bitte Teamnamen eingeben";
      return;
    }

    const { data, error } = await supabase
      .from("teams")
      .insert({ name })
      .select()
      .single();

    if (error) {
      console.error(error);
      startError.textContent = "Fehler beim Start";
      return;
    }

    teamId = data.id;
    startScreen.style.display = "none";
    gameScreen.style.display = "flex";
    updateUI();
  });

  /* UI UPDATE */
  function updateUI() {
    roundTitle.textContent = roundIndex === 0
      ? "🎵 Runde 1 – Hitster"
      : "🎬 Runde 2 – Filmmusik";

    songInfo.textContent = `Song ${songIndex + 1} von ${songCounts[roundIndex]}`;

    round1Inputs.style.display = roundIndex === 0 ? "block" : "none";
    round2Inputs.style.display = roundIndex === 1 ? "block" : "none";

    artistInput.value = "";
    titleInput.value = "";
    movieInput.value = "";
    saveStatus.textContent = "";
  }

  /* SONG NAVIGATION */
  window.nextSong = () => {
    songIndex = (songIndex + 1) % songCounts[roundIndex];
    updateUI();
  };

  window.prevSong = () => {
    if (songIndex > 0) songIndex--;
    updateUI();
  };

  /* ROUND SWITCH */
  window.switchRound = (idx) => {
    roundIndex = idx;
    songIndex = 0;
    updateUI();
  };

  /* SAVE ANSWER */
  document.getElementById("saveBtn").addEventListener("click", async () => {
    if (!teamId) return;

    const payload = {
      team_id: teamId,
      round: roundIndex + 1,
      song: songIndex + 1,
      artist: artistInput.value || null,
      title: titleInput.value || null,
      movie: movieInput.value || null
    };

    const { error } = await supabase
      .from("answers")
      .upsert(payload, { onConflict: "team_id,round,song" });

    if (error) {
      console.error(error);
      saveStatus.textContent = "❌ Fehler beim Speichern";
      return;
    }

    artistInput.value = "";
    titleInput.value = "";
    movieInput.value = "";
    saveStatus.textContent = "✅ Antwort live gespeichert";
  });

});
</script>

</body>
</html>
