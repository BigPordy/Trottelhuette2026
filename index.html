<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hitster – Runde 1 (Deezer Embed)</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin: 0;
    }
    .box {
      max-width: 420px;
      padding: 2rem;
      border-radius: 12px;
      background: #1f2937;
    }

    /* WICHTIG: Deezer-UI verstecken */
    .embed-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      margin-top: 1rem;
    }
    .embed-wrapper iframe {
      filter: brightness(0.85);
    }
    .cover {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 60%;
      background: #1f2937;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🎶 Hitster – Runde 1</h1>
    <p>Audio‑Test (Deezer Embed)</p>

    <div class="embed-wrapper">
      <iframe
        title="Deezer Player"
        src="https://widget.deezer.com/widget/dark/track/4538913"
        width="100%"
        height="90"
        frameborder="0"
        allow="encrypted-media; clipboard-write"
      ></iframe>
      <div class="cover"></div>
    </div>

    <p style="margin-top:1rem;font-size:0.9rem;opacity:0.7">
      Titel & Interpret sind bewusst verborgen
    </p>
  </div>
</body>
</html>
