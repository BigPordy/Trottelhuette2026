<script>
  function play() {
    const audio = new Audio(
      "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
    );
    audio.volume = 1.0;
    audio.play().then(() => {
      console.log("Audio läuft");
    }).catch(err => {
      alert("Audio-Fehler: " + err);
    });
  }
</script>
