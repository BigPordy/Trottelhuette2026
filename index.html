<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitster – Live (Phase B / Schritt 1)</title>

<!-- ✅ Supabase korrekt einbinden -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #020617;
  color: white;
  font-family: system-ui, sans-serif;
}

/* Screens */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: #1f2937;
  padding: 2rem;
  border-radius: 16px;
  width: 360px;
  text-align: center;
}

/* Form */
input {
  width: 100%;
  padding: 0.6rem;
  margin-top: 1rem;
  border-radius: 6px;
  border: none;
}

button {
  margin-top: 1.5rem;
  padding: 0.7rem 1.4rem;
  border-radius: 999px;
  border: none;
  background: #2563eb;
  color: white;
  font-size: 1rem;
  cursor: pointer;
}

.error {
  margin-top: 0.75rem;
  color: #fca5a5;
  font-size: 0.9rem;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen" class="screen">
  <div class="card">
    <h2>👥 Team anmelden</h2>

    <input id="teamNameInput" placeholder="Teamname eingeben" />

    <button onclick="startGame()">Spiel starten</button>

    <div id="startError" class="error"></div>
  </div>
</div>

<!-- PLAYER (Dummy, nur zur Bestätigung) -->
<div id="playerScreen" class="screen" style="display:none;">
  <div class="card">
    <h2>✅ Team ist live</h2>
    <p>Team wurde erfolgreich angelegt.</p>
    <p id="teamInfo"></p>
  </div>
</div>

<script>
/* ✅ Supabase Client */
const supabase = window.supabase.createClient(
  "https://havaoqxnxnlmyfbldyic.supabase.co",
  "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
);

let teamId = null;

/* ✅ Start Game: Team anlegen */
async function startGame() {
  const name = teamNameInput.value.trim();
  startError.textContent = "";

  if (!name) {
    startError.textContent = "Bitte Teamnamen eingeben";
    return;
  }

  const { data, error } = await supabase
    .from("teams")
    .insert({ name })
    .select()
    .single();

  if (error) {
    console.error(error);
    startError.textContent = "Fehler beim Anlegen des Teams";
    return;
  }

  teamId = data.id;

  // ✅ UI wechseln
  startScreen.style.display = "none";
  playerScreen.style.display = "flex";
  teamInfo.textContent = "Team-ID: " + teamId;
}
</script>

</body>
</html>
