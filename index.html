<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hitster – Runde 1</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(180deg, #0f172a, #020617);
      color: white;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .card {
      width: 360px;
      padding: 1.5rem;
      border-radius: 18px;
      background: #1f2937;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
    }

    .controls {
      margin-top: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    button {
      background: #0f172a;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 0.5rem 1rem;
      font-size: 1.2rem;
      cursor: pointer;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 0.75rem;
    }

    .hint {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>🎵 Hitster – Runde 1</h2>
    <p>Höre genau hin!</p>

    <audio id="player"></audio>

    <div class="controls">
      <button onclick="prev()">⏮</button>
      <button onclick="toggle()">▶ / ⏸</button>
      <button onclick="next()">⏭</button>
    </div>

    <input
      type="range"
      id="progress"
      min="0"
      max="100"
      value="0"
    />

    <div class="hint">
      Titel &amp; Interpret sind verborgen
    </div>
  </div>

  <script>
    const tracks = [
      "audio/01_fuer_elise.mp3",
      "audio/02_vivaldi_fruehling.mp3",
      "audio/03_mozart_nachtmusik.mp3"
      // später bis 15 erweitern
    ];

    let index = 0;
    const audio = document.getElementById("player");
    const progress = document.getElementById("progress");

    function load() {
      audio.src = tracks[index];
      audio.load();
    }

    function toggle() {
      audio.paused ? audio.play() : audio.pause();
    }

    function next() {
      index = (index + 1) % tracks.length;
      load();
      audio.play();
    }

    function prev() {
      index = (index - 1 + tracks.length) % tracks.length;
      load();
      audio.play();
    }

    audio.ontimeupdate = () => {
      if (!isNaN(audio.duration)) {
        progress.value = (audio.currentTime / audio.duration) * 100;
      }
    };

    progress.oninput = () => {
      if (!isNaN(audio.duration)) {
        audio.currentTime = audio.duration * (progress.value / 100);
      }
    };

    load();
  </script>
</body>
</html>
``
