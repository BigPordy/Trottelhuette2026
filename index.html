<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hitster – Runde 1</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(180deg, #0f172a, #020617);
      color: white;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .card {
      width: 360px;
      padding: 1.5rem;
      border-radius: 16px;
      background: #1f2937;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
    }

    .player-wrapper {
      position: relative;
      margin-top: 1rem;
      border-radius: 12px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 90px; /* Deezer Track Widget */
      border: none;
    }

    /* ✅ Maske: verdeckt ALLES oberhalb der Controls */
    .mask {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 55px; /* feinjustierbar */
      background: #1f2937;
      pointer-events: none;
    }

    .hint {
      margin-top: 1rem;
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>🎵 Hitster – Runde 1</h2>
    <p>Höre genau hin!</p>

    <div class="player-wrapper">
      <iframe
        src="https://widget.deezer.com/widget/dark/track/4538913"
        allow="encrypted-media"
        loading="lazy">
      </iframe>

      <!-- Sichtschutz für Cover / Titel / Interpret -->
      <div class="mask"></div>
    </div>

    <div class="hint">
      Titel & Interpret sind verborgen
    </div>
  </div>
</body>
</html>
