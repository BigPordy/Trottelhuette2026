<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitster – Live Spiel</title>

<!-- ✅ Supabase Client -->
https://unpkg.com/@supabase/supabase-js@2

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(180deg,#0f172a,#020617);
  color: white;
  font-family: system-ui, sans-serif;
}

.screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: 360px;
  background:#1f2937;
  border-radius:18px;
  padding:1.8rem;
  box-shadow: 0 20px 60px rgba(0,0,0,.45);
  text-align:center;
}

input {
  width:100%;
  padding:0.5rem;
  margin-top:0.75rem;
  border-radius:6px;
  border:none;
  font-size:1rem;
}

button {
  margin-top:1rem;
  padding:0.6rem 1.4rem;
  border-radius:999px;
  border:none;
  background:#2563eb;
  color:white;
  font-size:1rem;
  cursor:pointer;
}

.nav {
  display:flex;
  justify-content:space-between;
  gap:0.5rem;
  margin-top:0.75rem;
}

.audio-controls {
  display:flex;
  justify-content:center;
  gap:0.75rem;
  margin-top:1rem;
}

.hint {
  margin-top:0.6rem;
  font-size:0.85rem;
  opacity:0.8;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen" class="screen">
  <div class="card">
    <h2>👥 Team anmelden</h2>
    <input id="teamNameInput" placeholder="Teamname eingeben">
    <button id="startBtn">Spiel starten</button>
    <div id="startError" class="hint"></div>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen" style="display:none;">
  <div class="card">

    <!-- RUNDEN -->
    <div class="nav">
      <button onclick="switchRound(0)">🎵 Runde 1</button>
      <button onclick="switchRound(1)">🎬 Runde 2</button>
    </div>

    <h2 id="roundTitle"></h2>
    <div id="songInfo" class="hint"></div>

    <!-- AUDIO -->
    <audio id="audioPlayer"></audio>
    <div class="audio-controls">
      <button onclick="audioPlayer.currentTime=0">⏮</button>
      <button onclick="toggleAudio()">▶ / ⏸</button>
    </div>

    <!-- INPUTS -->
    <div id="round1Inputs">
      <input id="artistInput" placeholder="Interpret">
      <input id="titleInput" placeholder="Songtitel">
    </div>

    <div id="round2Inputs" style="display:none;">
      <input id="movieInput" placeholder="Filmtitel">
    </div>

    <button onclick="saveAnswer()">Antwort speichern</button>

    <div class="nav">
      <button onclick="prevSong()">⏮ Vorher</button>
      <button onclick="nextSong()">⏭ Nächster</button>
    </div>

    <div id="saveStatus" class="hint"></div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* SUPABASE */
  const supabase = window.supabase.createClient(
    "https://havaoqxnxnlmyfbldyic.supabase.co",
    "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
  );

  /* AUDIO LISTEN */
  const round1Tracks = Array.from({length:15},(_,i)=>`audio/${String(i+1).padStart(2,"0")}_*.mp3`);
  const round2Tracks = Array.from({length:16},(_,i)=>`audio-round2/${String(i+1).padStart(2,"0")}_*.mp3`);

  /* REAL TRACKPATHS (EXAKT WIE BEI DIR) */
  const tracks = [
    [
      "audio/01_fuer_elise.mp3","audio/02_vivaldi_fruehling.mp3","audio/03_mozart_nachtmusik.mp3",
      "audio/04_verdi_ladonna.mp3","audio/05_tschaikowski_schwanensee.mp3","audio/06_wagner_walkueren.mp3",
      "audio/07_beethoven_symphonie5.mp3","audio/08_bach_air.mp3","audio/09_mozart_nachtmusik.mp3",
      "audio/10_pachelbel_kanon.mp3","audio/11_mozart_turca.mp3","audio/12_orff_fortuna.mp3",
      "audio/13_bizet_carmen.mp3","audio/14_grieg_morgenstimmung.mp3","audio/15_strauss_donauwalser.mp3"
    ],
    [
      "audio-round2/01_forrest_gump.mp3","audio-round2/02_8mile.mp3","audio-round2/03_amelie.mp3",
      "audio-round2/04_harry_potter.mp3","audio-round2/05_godfather.mp3","audio-round2/06_fight_club.mp3",
      "audio-round2/07_intouchables.mp3","audio-round2/08_interstellar.mp3","audio-round2/09_schindlers_list.mp3",
      "audio-round2/10_inception.mp3","audio-round2/11_theoffice.mp3","audio-round2/12_requiem_for_a_dream.mp3",
      "audio-round2/13_stunde_des_siegers.mp3","audio-round2/14_batman_begins.mp3",
      "audio-round2/15_barbie.mp3","audio-round2/16_sherlock_holmes.mp3"
    ]
  ];

  /* STATE */
  let teamId = null;
  let roundIndex = 0;
  let songIndex = 0;

  /* DOM */
  const startScreen = document.getElementById("startScreen");
  const gameScreen = document.getElementById("gameScreen");
  const startBtn = document.getElementById("startBtn");
  const teamNameInput = document.getElementById("teamNameInput");
  const startError = document.getElementById("startError");

  const roundTitle = document.getElementById("roundTitle");
  const songInfo = document.getElementById("songInfo");
  const audioPlayer = document.getElementById("audioPlayer");

  const round1Inputs = document.getElementById("round1Inputs");
  const round2Inputs = document.getElementById("round2Inputs");

  const artistInput = document.getElementById("artistInput");
  const titleInput = document.getElementById("titleInput");
  const movieInput = document.getElementById("movieInput");
  const saveStatus = document.getElementById("saveStatus");

  /* FUNCTIONS */
  startBtn.onclick = async () => {
    const name = teamNameInput.value.trim();
    if (!name) return startError.textContent="Bitte Teamnamen eingeben";

    const { data } = await supabase.from("teams").insert({name}).select().single();
    teamId = data.id;
    startScreen.style.display="none";
    gameScreen.style.display="flex";
    loadSong();
  };

  function loadSong() {
    const src = tracks[roundIndex][songIndex];
    audioPlayer.src = src;
    roundTitle.textContent = roundIndex===0?"🎵 Runde 1":"🎬 Runde 2";
    songInfo.textContent = `Song ${songIndex+1}`;
    round1Inputs.style.display = roundIndex===0?"block":"none";
    round2Inputs.style.display = roundIndex===1?"block":"none";
  }

  function toggleAudio() {
    audioPlayer.paused ? audioPlayer.play() : audioPlayer.pause();
  }

  window.nextSong = () => {
    songIndex = (songIndex+1)%tracks[roundIndex].length;
    loadSong();
  };

  window.prevSong = () => {
    if(songIndex>0) songIndex--;
    loadSong();
  };

  window.switchRound = (i) => {
    roundIndex=i;
    songIndex=0;
    loadSong();
  };

  window.saveAnswer = async () => {
    const payload = {
      team_id: teamId,
      round: roundIndex+1,
      song: songIndex+1,
      artist: artistInput.value||null,
      title: titleInput.value||null,
      movie: movieInput.value||null
    };
    await supabase.from("answers").upsert(payload,{onConflict:"team_id,round,song"});
    artistInput.value=""; titleInput.value=""; movieInput.value="";
    saveStatus.textContent="✅ Antwort live gespeichert";
  };

  window.toggleAudio = toggleAudio;
});
</script>

</body>
</html>
