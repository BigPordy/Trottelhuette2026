<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hitster – Live</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: system-ui, sans-serif;
  background: linear-gradient(180deg,#0f172a,#020617);
  color: white;
  margin: 0;
  height: 100vh;
}
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  width: 360px;
  background:#1f2937;
  border-radius:18px;
  padding:1.5rem;
  text-align:center;
}
button {
  background:#2563eb;
  border:none;
  color:white;
  border-radius:999px;
  padding:0.5rem 1rem;
}
input {
  width:100%;
  margin-top:0.5rem;
  padding:0.4rem;
}
.controls { display:flex; gap:0.75rem; justify-content:center; margin-top:1rem; }
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <div class="card">
    <h2>👥 Team starten</h2>
    <input id="teamNameInput" placeholder="Teamname">
    <button onclick="startGame()">Start</button>
  </div>
</div>

<div id="playerScreen" class="screen" style="display:none;">
  <div class="card">
    <h2 id="roundTitle"></h2>
    <p id="questionText"></p>

    <audio id="player"></audio>

    <div class="controls">
      <button onclick="toggle()">▶ / ⏸</button>
    </div>

    <input id="artistInput" placeholder="Interpret">
    <input id="titleInput" placeholder="Songtitel">
    <input id="movieInput" placeholder="Filmtitel" style="display:none;">

    <button onclick="saveAnswer()">Antwort speichern</button>
    <p id="status"></p>
  </div>
</div>

<script>
const supabase = supabase.createClient(
  "https://havaoqxnxnlmyfbldyic.supabase.co",
  "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
);

let teamId = null;
let roundIndex = 0;
let songIndex = 0;

function startGame() {
  const name = teamNameInput.value.trim();
  if (!name) return;

  supabase.from("teams").insert({ name }).select().then(res => {
    teamId = res.data[0].id;
    startScreen.style.display = "none";
    playerScreen.style.display = "flex";
    updateUI();
  });
}

function updateUI() {
  if (roundIndex === 0) {
    roundTitle.textContent = "🎵 Runde 1 – Musik";
    questionText.textContent = "Interpret & Songtitel";
    artistInput.style.display = "block";
    titleInput.style.display = "block";
    movieInput.style.display = "none";
  } else {
    roundTitle.textContent = "🎬 Runde 2 – Filmmusik";
    questionText.textContent = "Aus welchem Film?";
    artistInput.style.display = "none";
    titleInput.style.display = "none";
    movieInput.style.display = "block";
  }
}

function saveAnswer() {
  const payload = {
    team_id: teamId,
    round: roundIndex + 1,
    song: songIndex + 1,
    artist: artistInput.value || null,
    title: titleInput.value || null,
    movie: movieInput.value || null
  };

  supabase.from("answers")
    .upsert(payload, { onConflict: "team_id,round,song" })
    .then(() => {
      artistInput.value = "";
      titleInput.value = "";
      movieInput.value = "";
      status.textContent = "✅ Gespeichert (live)";
    });
}
</script>
</body>
</html>
