<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hitster – Runde 1</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(180deg,#0f172a,#020617);
      color:white;
      margin:0;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
    }

    .card {
      width:360px;
      background:#1f2937;
      border-radius:18px;
      padding:1.5rem;
      box-shadow:0 20px 60px rgba(0,0,0,.45);
      text-align:center;
    }

    button {
      background:#0f172a;
      color:white;
      border:none;
      border-radius:999px;
      padding:0.5rem 1rem;
      font-size:1.2rem;
      cursor:pointer;
    }

    .controls {
      display:flex;
      justify-content:center;
      gap:0.75rem;
      margin-top:1rem;
    }

    input[type="range"] {
      width:100%;
      margin-top:0.75rem;
    }

    .time {
      margin-top:0.5rem;
      font-size:1.1rem;
      font-variant-numeric: tabular-nums;
    }

    .hint {
      margin-top:0.75rem;
      font-size:0.8rem;
      opacity:0.6;
    }
  </style>
</head>

<body>
<div class="card">
  <h2>🎵 Hitster – Runde 1</h2>
  <p>Titel &amp; Interpret erraten</p>

  <audio id="player"></audio>

  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="toggle()">▶ / ⏸</button>
    <button onclick="next()">⏭</button>
  </div>

  <input id="progress" type="range" min="0" max="100" value="0">

  <div class="time">
    <span id="current">00:00</span>
    /
    <span id="remaining">00:00</span>
  </div>

  <div class="hint">
    Runde 1 – Autofahrt
  </div>
</div>

<script>
/* ===== TRACKS ===== */
const tracks = [
  "audio/01_fuer_elise.mp3",
  "audio/02_vivaldi_fruehling.mp3",
  "audio/03_mozart_nachtmusik.mp3"
  // später bis 15 erweitern
];

let index = 0;

const audio = document.getElementById("player");
const progress = document.getElementById("progress");
const currentEl = document.getElementById("current");
const remainingEl = document.getElementById("remaining");

/* ===== HILFSFUNKTION ===== */
function formatTime(seconds) {
  seconds = Math.max(0, Math.floor(seconds));
  const m = String(Math.floor(seconds / 60)).padStart(2,"0");
  const s = String(seconds % 60).padStart(2,"0");
  return `${m}:${s}`;
}

/* ===== PLAYER ===== */
function loadTrack() {
  audio.src = tracks[index];
  audio.load();
  currentEl.textContent = "00:00";
  remainingEl.textContent = "00:00";
  progress.value = 0;
}

function toggle() {
  audio.paused ? audio.play() : audio.pause();
}

function next() {
  index = (index + 1) % tracks.length;
  loadTrack();
  audio.play();
}

function prev() {
  index = (index - 1 + tracks.length) % tracks.length;
  loadTrack();
  audio.play();
}

/* ===== ZEIT & PROGRESS ===== */
audio.ontimeupdate = () => {
  if (!isNaN(audio.duration)) {
    progress.value = (audio.currentTime / audio.duration) * 100;
    currentEl.textContent = formatTime(audio.currentTime);
    remainingEl.textContent = formatTime(audio.duration - audio.currentTime);
  }
};

progress.oninput = () => {
  if (!isNaN(audio.duration)) {
    audio.currentTime = audio.duration * (progress.value / 100);
  }
};

/* ===== INIT ===== */
loadTrack();
</script>
</body>
</html>
