<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitster – Live Spiel</title>

<!-- ✅ KORREKTES Supabase Script -->
<script src="https://unpkge/supabase-js@2</script>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(180deg,#0f172a,#020617);
  color: white;
  font-family: system-ui, sans-serif;
}

.screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: 360px;
  background:#1f2937;
  border-radius:18px;
  padding:1.8rem;
  box-shadow: 0 20px 60px rgba(0,0,0,.45);
  text-align:center;
}

input {
  width:100%;
  padding:0.5rem;
  margin-top:0.75rem;
  border-radius:6px;
  border:none;
  font-size:1rem;
}

button {
  margin-top:1.2rem;
  padding:0.6rem 1.4rem;
  border-radius:999px;
  border:none;
  background:#2563eb;
  color:white;
  font-size:1rem;
  cursor:pointer;
}

button:active {
  transform: scale(0.97);
}

.hint {
  margin-top:0.6rem;
  font-size:0.9rem;
  opacity:0.85;
}
</style>
</head>

<body>

<!-- STARTSCREEN -->
<div id="startScreen" class="screen">
  <div class="card">
    <h2>👥 Team anmelden</h2>
    <input id="teamNameInput" placeholder="Teamname eingeben">

    <button id="startBtn" type="button">
      Spiel starten
    </button>

    <div id="startError" class="hint"></div>
  </div>
</div>

<!-- BESTÄTIGUNG -->
<div id="gameScreen" class="screen" style="display:none;">
  <div class="card">
    <h2>✅ Start erfolgreich</h2>
    <p id="teamInfo"></p>
    <p class="hint">Team ist live mit Supabase verbunden.</p>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // ✅ Supabase Client (jetzt existiert window.supabase wirklich)
  const supabase = window.supabase.createClient(
    "https://havaoqxnxnlmyfbldyic.supabase.co",
    "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
  );

  const startBtn = document.getElementById("startBtn");
  const teamInput = document.getElementById("teamNameInput");
  const startError = document.getElementById("startError");
  const startScreen = document.getElementById("startScreen");
  const gameScreen = document.getElementById("gameScreen");
  const teamInfo = document.getElementById("teamInfo");

  startBtn.addEventListener("click", async () => {
    startError.textContent = "";

    const name = teamInput.value.trim();
    if (!name) {
      startError.textContent = "Bitte Teamnamen eingeben";
      return;
    }

    const { data, error } = await supabase
      .from("teams")
      .insert({ name })
      .select()
      .single();

    if (error) {
      console.error(error);
      startError.textContent = "Fehler beim Starten";
      return;
    }

    startScreen.style.display = "none";
    gameScreen.style.display = "flex";
    teamInfo.textContent = "Team-ID: " + data.id;
  });

});
</script>

</body>
</html>
