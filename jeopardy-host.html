<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Jeopardy – Host</title>

  <!-- Supabase Client -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1, h2 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-top: 30px;
    }

    .cell {
      background: #1e293b;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      border-radius: 10px;
      font-size: 22px;
      font-weight: bold;
      user-select: none;
    }

    .cell.used {
      background: #334155;
      opacity: 0.4;
      cursor: not-allowed;
    }

    #questionView {
      display: none;
      text-align: center;
      margin-top: 40px;
    }

    #questionText {
      font-size: 28px;
      margin-bottom: 30px;
    }

    select, button {
      font-size: 18px;
      padding: 10px 16px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      cursor: pointer;
    }

    .correct {
      background: #16a34a;
      color: white;
    }

    .wrong {
      background: #dc2626;
      color: white;
    }
    #finalScoreView {
  background: linear-gradient(135deg, #facc15, #fde68a);
  color: #1f2937;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 0 35px rgba(250, 204, 21, 0.8);
}

#finalScoreView h2 {
  font-size: 32px;
  margin-bottom: 30px;
}

#finalScoreList li {
  font-size: 22px;
  padding: 10px 0;
}
  </style>
</head>

<body>

<h1>🎯 Jeopardy – Host</h1>

<!-- ===================== -->
<!-- JEOPARDY BOARD -->
<!-- ===================== -->
<div id="board" class="grid"></div>

<!-- ===================== -->
<!-- QUESTION VIEW -->
<!-- ===================== -->
<div id="questionView">
  <div id="questionText"></div>

  <div>
    <select id="teamSelect"></select>
  </div>

  <div>
    <button class="correct" onclick="markCorrect()">✅ Richtig</button>
    <button class="wrong" onclick="markWrong()">❌ Falsch</button>
  </div>
</div>

<!-- ===================== -->
<!-- FINAL BUTTON -->
<!-- ===================== -->
<div style="text-align:center; margin-top:30px;">
  <button
    id="btnFinalScore"
    style="display:none;"
    onclick="showFinalScore()">
    🏆 Rundenscore &amp; Gesamtspielstand – Dummenpärchen 2026
  </button>
</div>

<!-- ===================== -->
<!-- FINAL SCORE VIEW -->
<!-- ===================== -->
<div id="finalScoreView" style="display:none; text-align:center; margin-top:40px;">
  <h2>🏆 Gesamtspielstand – Dummenpärchen 2026</h2>
  <ul
    id="finalScoreList"
    style="list-style:none; padding:0; font-size:22px;">
  </ul>
</div>

<!-- ===================== -->
<!-- APP SCRIPT -->
<!-- ===================== -->
<script src="jeopardy-host.js"></script>

</body>
</html>
