<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Buzzer – Team</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    
  body {
  margin: 0;
  padding: 0;
  background: #111;
  color: white;
  font-family: system-ui, sans-serif;
  text-align: center;
}

#buzzerWrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh; /* ganzer Bildschirm */
}

#buzzButton {
  width: 70vmin;
  height: 70vmin;
  max-width: 420px;
  max-height: 420px;

  border-radius: 50%;
  background: radial-gradient(
    circle at top,
    #ff5c5c,
    #c00000
  );

  border: none;
  color: white;
  font-size: 3rem;
  font-weight: 800;
  letter-spacing: 0.15em;

  cursor: pointer;
  box-shadow:
    0 18px 0 #7a0000,
    0 25px 40px rgba(0,0,0,0.6);

  transition: transform 0.05s ease, box-shadow 0.05s ease;
}

/* Druck-Effekt */
#buzzButton:active {
  transform: translateY(8px);
  box-shadow:
    0 10px 0 #7a0000,
    0 15px 25px rgba(0,0,0,0.5);
}

/* Falls gesperrt */
#buzzButton:disabled {
  background: #555;
  box-shadow: none;
  cursor: not-allowed;
}
/* Größere Teamauswahl für Mobile & Tablet */
#teamSelect {
  width: 90%;
  max-width: 420px;

  font-size: 1.6rem;       /* <-- TEXT GRÖSSE */
  padding: 1.2rem;         /* <-- TOUCH-FREUNDLICH */
  margin-top: 1rem;

  border-radius: 12px;
  border: 3px solid #374151;

  background-color: #1f2937;
  color: white;

  outline: none;
}

/* Fokus-Zustand (wichtig für UX) */
#teamSelect:focus {
  border-color: #2563eb;
}

/* Dropdown-Optionen größer darstellen */
#teamSelect option {
  font-size: 1.4rem;
  padding: 1rem;
}
#confirmTeam {
  margin-top: 1.5rem;
  padding: 1.2rem 2rem;

  font-size: 1.6rem;
  font-weight: 700;

  border-radius: 12px;
  border: none;

  background: #2563eb;
  color: white;
  cursor: pointer;
}

#confirmTeam:disabled {
  background: #475569;
  cursor: not-allowed;
}
    
#teamHeader {
  font-size: 1.6rem;
  margin-bottom: 1rem;
  padding: 0.8rem;
  background: #1f2937;
  border-radius: 10px;
}
    
</style>
</head>
<body>

<h1>🔊 Buzzer‑Runde</h1>

<div id="teamHeader" style="display:none;">
  <strong>Team:</strong> <span id="teamName"></span>
</div>
  
<div id="selectTeam">
  <p>Wählt euer Team:</p>
  <select id="teamSelect"></select>
  <br><br>
  <button id="confirmTeam" disabled>Team bestätigen</button>
</div>

<div id="buzzArea" style="display:none;">
  <h2>Bereit zum Buzzern</h2>
<div id="buzzerWrapper">
  <button id="buzzButton">BUZZ</button>
</div>
</div>

<script>
const db = window.supabase.createClient(
  "https://havaoqxnxnlmyfbldyic.supabase.co",
  "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
);

const teamSelect = document.getElementById("teamSelect");
const confirmTeam = document.getElementById("confirmTeam");
const selectTeamDiv = document.getElementById("selectTeam");
const buzzArea = document.getElementById("buzzArea");
const buzzButton = document.getElementById("buzzButton");
const teamHeader = document.getElementById("teamHeader");
const teamNameSpan = document.getElementById("teamName");

// ✅ Reload-Sicherheit: Team nach Seiten-Reload wieder anzeigen
const storedTeamId = sessionStorage.getItem("teamId");
const storedTeamName = sessionStorage.getItem("teamName");

if (storedTeamId && storedTeamName) {
  teamNameSpan.textContent = storedTeamName;
  teamHeader.style.display = "block";

  selectTeamDiv.style.display = "none";
  buzzArea.style.display = "block";
}
  
/**
 * TEMPORÄR: feste Frage
 * (wir ersetzen das später durch die echte aktive Frage aus buzzer_questions)
 */
const CURRENT_QUESTION_ID = 1;

async function loadTeams() {
  const { data } = await db.from("teams").select("id, name").order("created_at");
  data.forEach(team => {
    const opt = document.createElement("option");
    opt.value = team.id;
    opt.textContent = team.name;
    teamSelect.appendChild(opt);
  });
}

teamSelect.onchange = () => {
  confirmTeam.disabled = !teamSelect.value;
};

confirmTeam.onclick = () => {
  const teamId = teamSelect.value;
  const teamName = teamSelect.options[teamSelect.selectedIndex].text;

  sessionStorage.setItem("teamId", teamId);
  sessionStorage.setItem("teamName", teamName);

  teamNameSpan.textContent = teamName;
  teamHeader.style.display = "block";

  selectTeamDiv.style.display = "none";
  buzzArea.style.display = "block";
};

  buzzButton.onclick = async () => {
  const teamId = sessionStorage.getItem("teamId");

  if (!teamId) {
    alert("Kein Team gewählt!");
    return;
  }

  // Button sofort deaktivieren → verhindert Doppelklicks
  buzzButton.disabled = true;

  const { error } = await db.from("buzz_events").insert({
    team_id: teamId,
    question_id: CURRENT_QUESTION_ID
  });

  if (error) {
    console.error("Buzz fehlgeschlagen:", error);
    alert("Buzz fehlgeschlagen!");
    buzzButton.disabled = false; // optional wieder aktivieren
  } else {
    console.log("Buzz erfolgreich!");
  }
};
// =======================================
// ❌ TEAM-UI: PECH 300 (TEAM GESPERRT)
// =======================================
// 📍 Ort: buzzer-team.html
//      Direkt NACH buzzButton.onclick
function showBlocked() {
  buzzArea.innerHTML = `
    <h2>❌ Pech 300</h2>
    <p>Diese Frage ist für euch vorbei.</p>
  `;
}
// =======================================
// ✅ TEAM-UI: GEWINNER
// =======================================
// 📍 Ort: buzzer-team.html
//      Wird angezeigt, wenn dieses Team zuerst gebuzzert hat
function showWinner() {
  buzzArea.innerHTML = `
    <h2>✅ Du hast gebuzzert!</h2>
    <p>Warte auf die Entscheidung des Hosts …</p>
  `;
}

// =======================================
// ⏸️ TEAM-UI: ZU SPÄT
// =======================================
// 📍 Ort: buzzer-team.html
//      Wird angezeigt, wenn ein anderes Team schneller war
function showTooLate() {
  buzzArea.innerHTML = `
    <h2>⏸️ Zu spät</h2>
    <p>Ein anderes Team war schneller.</p>
  `;
}

// =======================================
// 🔁 TEAM-UI: RE-BUZZ FREIGEGEBEN
// =======================================
// 📍 Ort: buzzer-team.html
//      Zeigt nach ❌ Pech 300 den Buzzer erneut an
function showReadyForReBuzz() {
  buzzArea.innerHTML = `
    <h2>Bereit zum Buzzern</h2>
    <div id="buzzerWrapper">
      <button id="buzzButton">BUZZ</button>
    </div>
  `;

  const newBuzzButton = document.getElementById("buzzButton");

  newBuzzButton.onclick = async () => {
    const teamId = sessionStorage.getItem("teamId");
    newBuzzButton.disabled = true;

    await db.from("buzz_events").insert({
      team_id: teamId,
      question_id: CURRENT_QUESTION_ID
    });
  };
}
loadTeams();
// =======================================
// 📡 TEAM-SEITE: BROADCAST-LISTENER
// =======================================
// 📍 Ort: buzzer-team.html
//      Reagiert auf Host-Signale (lock / unlock)

const stateChannel = db.channel("buzzer-state");

stateChannel
  // 🔒 GLOBALER LOCK: ein Team hat gebuzzert
  .on("broadcast", { event: "lock" }, (payload) => {
    const winnerId = payload.payload.winnerTeamId;
    const myTeamId = sessionStorage.getItem("teamId");

    if (winnerId === myTeamId) {
      showWinner();
    } else {
      showTooLate();
    }
  })

  // 🔁 RE-BUZZ NACH ❌ PECH 300
  .on("broadcast", { event: "unlock" }, (payload) => {
    const blockedTeams = payload.payload.blockedTeams || [];
    const myTeamId = sessionStorage.getItem("teamId");

    if (blockedTeams.includes(myTeamId)) {
      showBlocked();
    } else {
      showReadyForReBuzz();
    }
  })

  .subscribe();
</script>

</body>
</html>
