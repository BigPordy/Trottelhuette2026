<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buzzer – Team</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      padding: 1rem;
      background: #111;
      color: white;
      font-family: system-ui, sans-serif;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      margin: 0.5rem 0;
      font-size: 2rem;
    }

    #teamHeader {
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: #1f2937;
      border-radius: 10px;
      display: none;
      min-width: 300px;
    }

    #selectTeam {
      background: #1f2937;
      border-radius: 12px;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
    }

    #teamSelect {
      width: 100%;
      max-width: 400px;
      font-size: 1.4rem;
      padding: 1rem;
      margin: 1rem 0;
      border-radius: 8px;
      border: 2px solid #375151;
      background: #0f172a;
      color: white;
      outline: none;
    }

    #teamSelect:focus {
      border-color: #2563eb;
    }

    #teamSelect option {
      font-size: 1.2rem;
      padding: 0.8rem;
      background: #0f172a;
      color: white;
    }

    #confirmTeam {
      width: 100%;
      max-width: 400px;
      font-size: 1.2rem;
      padding: 1rem;
      margin-top: 1rem;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }

    #confirmTeam:disabled {
      background: #666;
      cursor: not-allowed;
    }

    #confirmTeam:hover:not(:disabled) {
      background: #1d4ed8;
    }

    #buzzArea {
      display: none;
      width: 100%;
      max-width: 600px;
    }

    #buzzButton {
      width: 60vmin;
      height: 60vmin;
      max-width: 350px;
      max-height: 350px;
      border-radius: 50%;
      border: none;
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.05s ease;
      box-shadow: 0 15px 0 #7a0000, 0 20px 40px rgba(0, 0, 0, 0.6);
      background: radial-gradient(circle at top, #ff5c5c, #c00000);
      color: white;
      margin: 1rem auto;
    }

    #buzzButton:active:not(:disabled) {
      transform: translateY(6px);
      box-shadow: 0 9px 0 #7a0000, 0 12px 25px rgba(0, 0, 0, 0.5);
    }

    #buzzButton:disabled {
      background: #555;
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .status-message {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 1rem 0;
      padding: 1.5rem;
      border-radius: 8px;
      text-align: center;
    }

    .status-message.winner {
      background: #14532d;
      color: #22c55e;
    }

    .status-message.blocked {
      background: #7f1d1d;
      color: #fca5a5;
    }

    .status-message.waiting {
      background: #1f2937;
      color: #93c5fd;
    }

    #buzzerWrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
  </style>
</head>

<body>

<h1>🔊 Buzzer‑Runde</h1>

<!-- ===================================== -->
<!-- 👤 TEAM-HEADER (Nach Auswahl) -->
<!-- ===================================== -->
<div id="teamHeader">
  <strong>Team:</strong> <span id="teamName"></span>
</div>

<!-- ===================================== -->
<!-- 🎯 TEAM-AUSWAHL SCREEN -->
<!-- ===================================== -->
<div id="selectTeam">
  <h2>Wähle dein Team:</h2>
  <select id="teamSelect">
    <option value="">-- Bitte wählen --</option>
  </select>
  <button id="confirmTeam" disabled>✅ Team bestätigen</button>
</div>

<!-- ===================================== -->
<!-- 🔘 BUZZER SCREEN -->
<!-- ===================================== -->
<div id="buzzArea">
  <div id="buzzerWrapper">
    <button id="buzzButton">BUZZ</button>
  </div>
  <div id="statusMessage" class="status-message waiting" style="display: none;"></div>
</div>

<script>
// =======================================
// 🔧 SUPABASE INITIALISIERUNG
// =======================================
const db = window.supabase.createClient(
  "https://havaoqxnxnlmyfbldyic.supabase.co",
  "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
);

// =======================================
// 📡 REALTIME CHANNEL
// =======================================
const stateChannel = db.channel("buzzer-state");

// =======================================
// 🎯 DOM-REFERENZEN
// =======================================
const selectTeam = document.getElementById("selectTeam");
const teamSelect = document.getElementById("teamSelect");
const confirmTeam = document.getElementById("confirmTeam");
const buzzArea = document.getElementById("buzzArea");
const teamHeader = document.getElementById("teamHeader");
const teamName = document.getElementById("teamName");
const buzzButton = document.getElementById("buzzButton");
const statusMessage = document.getElementById("statusMessage");
const buzzerWrapper = document.getElementById("buzzerWrapper");

// =======================================
// 🎮 GAME STATE
// =======================================
let currentTeamId = null;
let currentTeamName = null;
let currentQuestion = null;
let blockedTeamsArray = [];

// =======================================
// 💾 RELOAD-SICHERHEIT
// =======================================
// Nach Seiten-Reload Team wieder laden
const storedTeamId = sessionStorage.getItem("teamId");
const storedTeamName = sessionStorage.getItem("teamName");

if (storedTeamId && storedTeamName) {
  currentTeamId = storedTeamId;
  currentTeamName = storedTeamName;
  teamName.textContent = currentTeamName;
  teamHeader.style.display = "block";
  selectTeam.style.display = "none";
  buzzArea.style.display = "block";
  showReadyForBuzz();
}

// =======================================
// 📋 TEAMS AUS DB LADEN
// =======================================
async function loadTeams() {
  const { data } = await db
    .from("teams")
    .select("id, name")
    .order("created_at");

  if (!data) return;

  // Dropdown füllen
  data.forEach(team => {
    const opt = document.createElement("option");
    opt.value = team.id;
    opt.textContent = team.name;
    teamSelect.appendChild(opt);
  });
}

// =======================================
// 🎯 TEAM-AUSWAHL HANDLER
// =======================================
teamSelect.onchange = () => {
  confirmTeam.disabled = !teamSelect.value;
};

confirmTeam.onclick = () => {
  currentTeamId = teamSelect.value;
  currentTeamName = teamSelect.options[teamSelect.selectedIndex].text;

  // Speichern für Reload-Sicherheit
  sessionStorage.setItem("teamId", currentTeamId);
  sessionStorage.setItem("teamName", currentTeamName);

  // UI umschalten
  teamName.textContent = currentTeamName;
  teamHeader.style.display = "block";
  selectTeam.style.display = "none";
  buzzArea.style.display = "block";

  showReadyForBuzz();
};

// =======================================
// 🔘 BUZZ BUTTON HANDLER
// =======================================
buzzButton.onclick = async () => {
  console.log("🔔 Buzz gesendet!");

  // Button sofort deaktivieren
  buzzButton.disabled = true;

  const questionId = Number(sessionStorage.getItem("currentQuestionIndex")) || 1;

  // ✅ BUZZ IN DB SPEICHERN
  const { error } = await db.from("buzz_events").insert({
    team_id: currentTeamId,
    question_id: questionId
  });

  if (error) {
    console.error("❌ Buzz-Fehler:", error);
    buzzButton.disabled = false;
    return;
  }

  console.log("✅ Buzz erfolgreich gespeichert!");
};

// =======================================
// 📊 UI-FUNKTIONEN
// =======================================

function showReadyForBuzz() {
  statusMessage.textContent = "Bereit zum Buzzern!";
  statusMessage.className = "status-message waiting";
  statusMessage.style.display = "block";
  buzzButton.disabled = false;
  buzzButton.textContent = "BUZZ";
}

function showWinner() {
  statusMessage.textContent = "✅ Du hast gebuzzert!\nWarte auf die Entscheidung…";
  statusMessage.className = "status-message winner";
  statusMessage.style.display = "block";
  buzzButton.disabled = true;
  buzzButton.textContent = "⏳ Warte…";
}

function showTooLate() {
  statusMessage.textContent = "⏸️ Zu spät!\nEin anderes Team war schneller.";
  statusMessage.className = "status-message waiting";
  statusMessage.style.display = "block";
  buzzButton.disabled = true;
  buzzButton.textContent = "⏸ Warte…";
}

function showBlocked() {
  statusMessage.textContent = "❌ PECH 300\nDiese Frage ist für euch vorbei.";
  statusMessage.className = "status-message blocked";
  statusMessage.style.display = "block";
  buzzButton.disabled = true;
  buzzButton.textContent = "🚫 Gesperrt";
}

function showReBuzzReady() {
  statusMessage.textContent = "🔓 Nächste Chance!\nNeue Teams dürfen buzzern.";
  statusMessage.className = "status-message waiting";
  statusMessage.style.display = "block";
  buzzButton.disabled = false;
  buzzButton.textContent = "BUZZ";
}

// =======================================
// 📡 BROADCAST LISTENER
// =======================================
stateChannel
  // 🔒 LOCK: Ein Team hat gebuzzert
  .on("broadcast", { event: "lock" }, (payload) => {
    console.log("🔒 LOCK Signal empfangen:", payload);

    // Aktuelle Frage speichern
    if (payload.payload.questionIndex !== undefined) {
      sessionStorage.setItem(
        "currentQuestionIndex",
        payload.payload.questionIndex
      );
    }

    const winnerId = payload.payload.winnerTeamId;
    const myTeamId = sessionStorage.getItem("teamId");

    // ❓ Bin ich der Gewinner?
    if (String(winnerId) === String(myTeamId)) {
      console.log("✅ ICH habe gewonnen!");
      showWinner();
    } else {
      console.log("⏸️ Anderes Team hat gewonnen");
      showTooLate();
    }
  })

  // 🔓 UNLOCK: Re-Buzz oder nächste Frage
  .on("broadcast", { event: "unlock" }, (payload) => {
    console.log("🔓 UNLOCK Signal empfangen:", payload);

    // Aktuelle Frage speichern
    if (payload.payload.questionIndex !== undefined) {
      sessionStorage.setItem(
        "currentQuestionIndex",
        payload.payload.questionIndex
      );
    }

    const blockedTeams = payload.payload.blockedTeams || [];
    const myTeamId = sessionStorage.getItem("teamId");

    // 🔴 Bin ich geblockt?
    const isBlocked = blockedTeams
      .map(String)
      .includes(String(myTeamId));

    if (isBlocked) {
      console.log("❌ Ich bin geblockt für diese Frage");
      showBlocked();
    } else {
      console.log("✅ Ich darf buzzern!");
      showReBuzzReady();
    }
  })

  .subscribe();

// =======================================
// 🎬 SEITE LADEN
// =======================================
document.addEventListener("DOMContentLoaded", async () => {
  console.log("📱 Team-Seite geladen");
  await loadTeams();
});

</script>

</body>
</html>
