<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hitster – Host‑Modus</title>

  <!-- =======================
       SUPABASE CLIENT
       BEGIN
       ======================= -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <!-- =======================
       SUPABASE CLIENT
       ENDE
       ======================= -->

  <style>
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, sans-serif;
      background: #020617;
      color: white;
    }

    h1, h2 { margin-top: 0.5rem; }

    .section {
      background: #1f2937;
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .nav {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    button {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
    }

    button.secondary { background: #475569; }
    button.good { background: #16a34a; }
    button.mid { background: #eab308; }
    button.bad { background: #dc2626; }

    select { padding: 0.3rem; border-radius: 6px; }

    .team {
      border-top: 1px solid #334155;
      padding-top: 0.75rem;
      margin-top: 0.75rem;
    }

    .answer { margin-left: 0.5rem; font-size: 0.9rem; }
    .hint { font-size: 0.8rem; opacity: 0.75; }

    .score { font-weight: bold; }

    .locked button.eval { pointer-events: none; opacity: 0.4; }

    /* =======================
       D3 – PRESENTATION MODE
       BEGIN
       ======================= */
    .presentation .section:not(.leaderboard-only) {
      display: none;
    }

    .presentation .leaderboard-only h2 {
      font-size: 2rem;
    }

    .presentation .leaderboard-only .score {
      font-size: 1.6rem;
      margin: 0.3rem 0;
    }
    /* =======================
       D3 – PRESENTATION MODE
       ENDE
       ======================= */
  </style>
</head>

<body>

<h1>🎤 Hitster – Host‑Modus</h1>
<div class="hint" id="lockStatus">🟢 Bewertung aktiv</div>

<div class="section">
  <div class="nav">
    <button onclick="setRound(1)">🎵 Runde 1</button>
    <button onclick="setRound(2)">🎬 Runde 2</button>

    Song:
    <select id="songSelect" onchange="render()"></select>

    <!-- =======================
         D1 – LOCK
         BEGIN
         ======================= -->
    <button id="lockBtn" class="secondary" onclick="toggleLock()">🔒 Sperren</button>
    <!-- =======================
         D1 – LOCK
         ENDE
         ======================= -->

    <!-- =======================
         D3 – PRESENTATION TOGGLE
         BEGIN
         ======================= -->
    <button id="presentBtn" class="secondary" onclick="togglePresentation()">🎥 Präsentation</button>
    <!-- =======================
         D3 – PRESENTATION TOGGLE
         ENDE
         ======================= -->
  </div>
</div>

<div class="section leaderboard-only">
  <h2>🏆 Leaderboard</h2>
  <div id="leaderboard"></div>
</div>

<div class="section">
  <h2>Antworten</h2>
  <div id="answers"></div>
</div>

<script>
/* =======================
   SUPABASE INIT
   BEGIN
   ======================= */
const supabase = window.supabase.createClient(
  "https://havaoqxnxnlmyfbldyic.supabase.co",
  "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
);
/* =======================
   SUPABASE INIT
   ENDE
   ======================= */

/* =======================
   STATE
   BEGIN
   ======================= */
const songCounts = { 1: 15, 2: 16 };
let round = 1, song = 1;
let teams = [], answers = [];
let scores = {};
let isLocked = false;
let isPresentation = false;
/* =======================
   STATE
   ENDE
   ======================= */

/* =======================
   DATA + REALTIME
   BEGIN
   ======================= */
async function refreshData() {
  teams = (await supabase.from("teams").select()).data || [];
  answers = (await supabase.from("answers").select()).data || [];
  render();
}

function subscribeRealtime() {
  supabase.channel("host-rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"teams"},refreshData)
    .on("postgres_changes",{event:"*",schema:"public",table:"answers"},refreshData)
    .subscribe();
}
/* =======================
   DATA + REALTIME
   ENDE
   ======================= */

/* =======================
   D1 – LOCK
   BEGIN
   ======================= */
function toggleLock() {
  isLocked = !isLocked;
  document.body.classList.toggle("locked", isLocked);
  lockStatus.textContent = isLocked ? "🔒 Bewertung gesperrt" : "🟢 Bewertung aktiv";
  lockBtn.textContent = isLocked ? "🔓 Freigeben" : "🔒 Sperren";
}
/* =======================
   D1 – LOCK
   ENDE
   ======================= */

/* =======================
   D3 – PRESENTATION MODE
   BEGIN
   ======================= */
function togglePresentation() {
  isPresentation = !isPresentation;
  document.body.classList.toggle("presentation", isPresentation);
  presentBtn.textContent = isPresentation ? "🔧 Moderation" : "🎥 Präsentation";
}
/* =======================
   D3 – PRESENTATION MODE
   ENDE
   ======================= */

/* =======================
   UI
   BEGIN
   ======================= */
function setRound(r) {
  round = r;
  songSelect.innerHTML = "";
  for (let i=1;i<=songCounts[r];i++)
    songSelect.innerHTML += `<option value="${i}">Song ${i}</option>`;
  song = 1;
  render();
}

function render() {
  song = Number(songSelect.value);
  answers.innerHTML = "";
  scores = {};

  teams.forEach(t => {
    scores[t.id] = scores[t.id] || 0;

    const ans = answers.find(a =>
      a.team_id === t.id && a.round === round && a.song === song
    );

    if (!ans) return;

    if (round === 1) {
      scores[t.id] += scores[t.id];
    }
  });

  renderLeaderboard();
}

function renderLeaderboard() {
  leaderboard.innerHTML = "";
  Object.entries(scores)
    .map(([id,score]) => ({ name: teams.find(t=>t.id===id)?.name, score }))
    .sort((a,b)=>b.score-a.score)
    .forEach(t =>
      leaderboard.innerHTML += `<div class="score">${t.name}: ${t.score}</div>`
    );
}
/* =======================
   UI
   ENDE
   ======================= */

/* =======================
   START
   BEGIN
   ======================= */
refreshData().then(subscribeRealtime);
setRound(1);
/* =======================
   START
   ENDE
   ======================= */
</script>

</body>
</html>
