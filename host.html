<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitster – Host‑Modus</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;padding:1rem;
  font-family:system-ui,sans-serif;
  background:#020617;color:white;
}

h1{margin-bottom:.2rem}
.hint{opacity:.7;margin-bottom:1rem}

.section{
  background:#1f2937;
  border-radius:14px;
  padding:1rem;
  margin-bottom:1rem;
}

.nav{
  display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;
}

button{
  padding:.45rem 1.2rem;
  border-radius:999px;
  border:none;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-size:.95rem;
}
button.secondary{background:#475569}
select{padding:.35rem;border-radius:6px}

.header-row{
  display:grid;
  grid-template-columns:360px 1fr;
  column-gap:2.5rem;
  border-bottom:3px solid #64748b;
  padding-bottom:.6rem;
  margin-bottom:.6rem;
  opacity:.8;
  letter-spacing:.08em;
}

.team{
  display:grid;
  grid-template-columns:360px 1fr;
  column-gap:2.5rem;
  align-items:center;
  padding:.9rem 0;
  border-top:3px solid #475569;
}
.team:first-child{border-top:none}

.team-name{
  font-size:1.4rem;
  font-weight:700;
  text-transform:uppercase;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  padding-right:1.5rem;
  border-right:3px solid #64748b;
}

.answer{
  padding-left:1.5rem;
  font-size:1.15rem;
}
.answer.hint{opacity:.6;font-style:italic}

.team.correct{background:#14532d}
.team.partial{background:#713f12}
.team.wrong{background:#7f1d1d}

.solution{
  font-size:1.7rem;
  font-weight:800;
  text-align:center;
  margin:1rem 0;
  color:#22c55e;
}
</style>
</head>

<body>

<h1>🎤 Hitster – Host‑Modus</h1>
<div class="hint">Antworten → Lösung → Bewertung</div>

<div class="section">
  <div class="nav">
    <button id="round1Btn">🎵 Hitster – Klassik</button>
    <button id="round2Btn">🎬 Filmmusik</button>

    Song:
    <select id="songSelect"></select>

    <button id="showAnswersBtn" class="secondary">👀 Antworten anzeigen</button>
    <button id="showSolutionBtn" class="secondary">✅ Richtige Antwort anzeigen</button>
  </div>
</div>

<div id="solutionBox" class="solution" style="display:none;"></div>

<div class="section">
  <div class="header-row">
    <div>TEAM</div>
    <div>ANTWORT</div>
  </div>
  <div id="answersContainer"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

const supabase = window.supabase.createClient(
  "https://havaoqxnxnlmyfbldyic.supabase.co",
  "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
);

const songCounts = {1:15,2:16};
let round=1, song=1;
let teams=[], answers=[];
let answersVisible=false, solutionVisible=false;

/* ---------- UTIL ---------- */
const normalize=s=>(s||"")
 .toLowerCase()
 .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
 .replace(/[^a-z0-9]/g,"");

function similarity(a,b){
 if(!a||!b) return 0;
 let m=0;
 for(let i=0;i<Math.min(a.length,b.length);i++)
  if(a[i]===b[i]) m++;
 return m/Math.max(a.length,b.length);
}
function classify(s){
 if(s>=0.85) return"correct";
 if(s>=0.6) return"partial";
 return"wrong";
}

/* ---------- SOLUTIONS ---------- */
const solutions = {
  1:{ // Runde 1 – Klassik
    1:{display:"Ludwig van Beethoven – Für Elise",composer:["beethoven"],title:["fur elise","fuer elise"]},
    2:{display:"Antonio Vivaldi – Der Frühling",composer:["vivaldi"],title:["fruhling","la primavera"]},
    3:{display:"W. A. Mozart – Hochzeit des Figaro",composer:["mozart"],title:["hochzeit des figaro"]},
    4:{display:"Giuseppe Verdi – La donna è mobile",composer:["verdi"],title:["la donna e mobile"]},
    5:{display:"Tschaikowski – Schwanensee",composer:["tschaikowski"],title:["schwanensee"]},
    6:{display:"Richard Wagner – Ritt der Walküren",composer:["wagner"],title:["ritt der walkuren"]},
    7:{display:"Beethoven – 5. Symphonie",composer:["beethoven"],title:["5 symphonie","schicksalssymphonie"]},
    8:{display:"J. S. Bach – Air",composer:["bach"],title:["air"]},
    9:{display:"Mozart – Eine kleine Nachtmusik",composer:["mozart"],title:["eine kleine nachtmusik"]},
    10:{display:"Pachelbel – Kanon in D",composer:["pachelbel"],title:["kanon"]},
    11:{display:"Mozart – Rondo alla Turca",composer:["mozart"],title:["rondo alla turca"]},
    12:{display:"Carl Orff – O Fortuna",composer:["orff"],title:["o fortuna"]},
    13:{display:"Georges Bizet – Carmen",composer:["bizet"],title:["carmen"]},
    14:{display:"Edvard Grieg – Morgenstimmung",composer:["grieg"],title:["morgenstimmung"]},
    15:{display:"Johann Strauss II – An der schönen blauen Donau",composer:["strauss"],title:["an der schonen blauen donau"]}
  },
  2:{ // Runde 2 – Filmmusik
    1:{display:"Forrest Gump",movie:["forrest gump"]},
    2:{display:"8 Mile",movie:["8 mile","eight mile"]},
    3:{display:"Die fabelhafte Welt der Amélie",movie:["amelie"]},
    4:{display:"Harry Potter – Hedwig’s Theme",movie:["harry potter","hedwig"]},
    5:{display:"The Godfather",movie:["godfather","pate"]},
    6:{display:"Fight Club",movie:["fight club"]},
    7:{display:"Ziemlich beste Freunde",movie:["ziemlich beste freunde"]},
    8:{display:"Interstellar",movie:["interstellar"]},
    9:{display:"Schindlers Liste",movie:["schindlers liste"]},
    10:{display:"Inception",movie:["inception"]},
    11:{display:"The Office",movie:["the office"]},
    12:{display:"Requiem for a Dream",movie:["requiem for a dream"]},
    13:{display:"Chariots of Fire",movie:["chariots","stunde des siegers"]},
    14:{display:"Batman Begins",movie:["batman begins"]},
    15:{display:"Barbie",movie:["barbie"]},
    16:{display:"Sherlock Holmes",movie:["sherlock holmes"]}
  }
};

/* ---------- DATA ---------- */
async function refreshData(){
 teams=(await supabase.from("teams").select("*").order("created_at")).data||[];
 answers=(await supabase.from("answers").select("*")).data||[];
 render();
}

function populateSongs(){
 songSelect.innerHTML="";
 for(let i=1;i<=songCounts[round];i++)
  songSelect.innerHTML+=`<option value="${i}">Song ${i}</option>`;
 song=1;
}

/* ---------- RENDER ---------- */
function resetView(){
 answersVisible=false;
 solutionVisible=false;
 solutionBox.style.display="none";
 render();
}

function render(){
 answersContainer.innerHTML="";
 teams.forEach(team=>{
  const row=document.createElement("div");
  row.className="team";
  row.innerHTML=`<div class="team-name">${team.name}</div>`;

  const ans=answers.find(a=>a.team_id===team.id&&a.round===round&&a.song===song);

  if(!answersVisible){
    row.innerHTML+=`<div class="answer hint"></div>`;
  } else if(!ans || (!ans.artist && !ans.movie)){
    row.innerHTML+=`<div class="answer hint">Keine Antwort</div>`;
  } else if(!solutionVisible){
    row.innerHTML+=round===1
      ? `<div class="answer">${ans.artist} – ${ans.title}</div>`
      : `<div class="answer">${ans.movie}</div>`;
  } else {
    let score=0;
    const sol=solutions[round][song];
    if(round===1){
      score=Math.max(
        ...sol.composer.map(c=>similarity(normalize(ans.artist),normalize(c))),
        ...sol.title.map(t=>similarity(normalize(ans.title),normalize(t)))
      );
    } else {
      score=Math.max(...sol.movie.map(m=>similarity(normalize(ans.movie),normalize(m))));
    }
    row.classList.add(classify(score));
    row.innerHTML+=round===1
      ? `<div class="answer">${ans.artist} – ${ans.title}</div>`
      : `<div class="answer">${ans.movie}</div>`;
  }
  answersContainer.appendChild(row);
 });
}

/* ---------- EVENTS ---------- */
round1Btn.onclick=()=>{round=1;populateSongs();resetView();}
round2Btn.onclick=()=>{round=2;populateSongs();resetView();}
songSelect.onchange=e=>{song=Number(e.target.value);resetView();}

showAnswersBtn.onclick=()=>{answersVisible=true;render();}
showSolutionBtn.onclick=()=>{
 solutionBox.textContent=solutions[round][song].display;
 solutionBox.style.display="block";
 solutionVisible=true;
 render();
}

/* ---------- START ---------- */
populateSongs();
refreshData();

});
</script>

</body>
</html>
