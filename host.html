<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hitster – Host‑Modus</title>

  <!-- =======================================================
       SUPABASE CLIENT (BEGINN)
       ======================================================= -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <!-- =======================================================
       SUPABASE CLIENT (ENDE)
       ======================================================= -->

  <style>
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, sans-serif;
      background: #020617;
      color: white;
    }

    h1, h2 {
      margin-top: 0.5rem;
    }

    .section {
      background: #1f2937;
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .nav {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    button {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
    }

    select {
      padding: 0.3rem;
      border-radius: 6px;
      border: none;
    }

    .team {
      border-top: 1px solid #334155;
      padding-top: 0.5rem;
      margin-top: 0.5rem;
    }

    .answer {
      margin-left: 1rem;
      font-size: 0.9rem;
      opacity: 0.95;
    }

    .hint {
      font-size: 0.8rem;
      opacity: 0.75;
      margin-top: 0.25rem;
    }

    .score {
      font-weight: bold;
    }

    .checkbox {
      margin-right: 0.4rem;
    }
  </style>
</head>

<body>

<h1>🎤 Hitster – Host‑Modus</h1>
<div class="hint">🟢 Live verbunden (Realtime)</div>

<div class="section">
  <h2>Navigation</h2>
  <div class="nav">
    <button onclick="setRound(1)">🎵 Runde 1</button>
    <button onclick="setRound(2)">🎬 Runde 2</button>
  </div>
  Song:
  <select id="songSelect" onchange="render()"></select>
</div>

<div class="section">
  <h2>Antworten</h2>
  <div id="answers"></div>
</div>

<div class="section">
  <h2>🏆 Leaderboard</h2>
  <div id="leaderboard"></div>
</div>

<script>
/* ==========================================================
   SUPABASE INITIALISIERUNG
   ========================================================== */
const supabase = window.supabase.createClient(
  "https://havaoqxnxnlmyfbldyic.supabase.co",
  "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
);

/* ==========================================================
   GRUNDKONFIGURATION
   ========================================================== */
const songCounts = { 1: 15, 2: 16 };

let round = 1;
let song = 1;
let teams = [];
let answers = [];
let scores = {};

/* ==========================================================
   PHASE C – RECHTSCHREIB-TOLERANZ (BEGINN)
   ========================================================== */

/* Text vereinheitlichen */
function normalizeText(str) {
  if (!str) return "";
  return str
    .toLowerCase()
    .replace(/ä/g, "ae")
    .replace(/ö/g, "oe")
    .replace(/ü/g, "ue")
    .replace(/ß/g, "ss")
    .replace(/[^a-z0-9\s]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

/* Sehr einfache Ähnlichkeitsberechnung */
function similarity(a, b) {
  if (!a || !b) return 0;
  let matches = 0;
  for (let i = 0; i < Math.min(a.length, b.length); i++) {
    if (a[i] === b[i]) matches++;
  }
  return matches / Math.max(a.length, b.length);
}

function similarityLabel(score) {
  if (score >= 0.85) return "✅ wahrscheinlich richtig";
  if (score >= 0.70) return "❓ Grenzfall";
  return "❌ eher falsch";
}

/* Korrekte Lösungen – Runde 2 */
const correctSolutions = {
  2: {
    1: "forrest gump",
    2: "8 mile",
    3: "amelie",
    4: "harry potter",
    5: "the godfather",
    6: "fight club",
    7: "intouchables",
    8: "interstellar",
    9: "schindlers liste",
    10: "inception",
    11: "the office",
    12: "requiem for a dream",
    13: "chariots of fire",
    14: "batman begins",
    15: "barbie",
    16: "sherlock holmes"
  }
};

/* ==========================================================
   PHASE C – RECHTSCHREIB-TOLERANZ (ENDE)
   ========================================================== */

/* ==========================================================
   DATENLADEN + REALTIME
   ========================================================== */
async function refreshData() {
  const { data: t } = await supabase.from("teams").select("*");
  const { data: a } = await supabase.from("answers").select("*");
  teams = t || [];
  answers = a || [];
  render();
}

function subscribeRealtime() {
  supabase
    .channel("host-realtime")
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "answers" },
      () => refreshData()
    )
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "teams" },
      () => refreshData()
    )
    .subscribe();
}

/* ==========================================================
   UI LOGIK
   ========================================================== */
function setRound(r) {
  round = r;
  const sel = document.getElementById("songSelect");
  sel.innerHTML = "";
  for (let i = 1; i <= songCounts[r]; i++) {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = `Song ${i}`;
    sel.appendChild(opt);
  }
  song = 1;
  render();
}

function render() {
  song = Number(document.getElementById("songSelect").value);
  const container = document.getElementById("answers");
  container.innerHTML = "";
  scores = {};

  teams.forEach(team => {
    scores[team.id] = 0;
    const div = document.createElement("div");
    div.className = "team";
    div.innerHTML = `<h3>${team.name}</h3>`;

    const ans = answers.find(a =>
      a.team_id === team.id &&
      a.round === round &&
      a.song === song
    );

    if (!ans) {
      div.innerHTML += `<div class="answer">Keine Antwort</div>`;
      container.appendChild(div);
      return;
    }

    if (round === 2) {
      const user = normalizeText(ans.movie);
      const correct = normalizeText(correctSolutions[2][song]);
      const score = similarity(user, correct);

      div.innerHTML += `
        <div class="answer">
          ${ans.movie}
          <div class="hint">${similarityLabel(score)} (Score ${score.toFixed(2)})</div>
        </div>
        <label>
          <input class="checkbox" type="checkbox" onchange="updateScore('${team.id}', 2)">
          richtig
        </label>
      `;
    } else {
      div.innerHTML += `
        <div class="answer">
          ${ans.artist || "-"} – ${ans.title || "-"}
        </div>
        <label><input class="checkbox" type="checkbox" onchange="updateScore('${team.id}',1)"> Interpret</label>
        <label><input class="checkbox" type="checkbox" onchange="updateScore('${team.id}',1)"> Titel</label>
        <label><input class="checkbox" type="checkbox" onchange="updateScore('${team.id}',1)"> Bonus</label>
      `;
    }
    container.appendChild(div);
  });

  renderLeaderboard();
}

function updateScore(teamId, add) {
  scores[teamId] += add;
  renderLeaderboard();
}

function renderLeaderboard() {
  const lb = document.getElementById("leaderboard");
  lb.innerHTML = "";
  teams
    .map(t => ({ name: t.name, score: scores[t.id] || 0 }))
    .sort((a,b)=>b.score-a.score)
    .forEach(t => {
      lb.innerHTML += `<div class="score">${t.name}: ${t.score} Punkte</div>`;
    });
}

/* ==========================================================
   START
   ========================================================== */
refreshData().then(subscribeRealtime);
setRound(1);
</script>

</body>
</html>
