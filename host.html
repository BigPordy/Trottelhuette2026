<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitster – Host‑Modus</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;padding:1rem;
  font-family:system-ui,sans-serif;
  background:#020617;color:white;
}

h1{margin-bottom:.2rem}
.hint{opacity:.7;margin-bottom:1rem}

.section{
  background:#1f2937;
  border-radius:14px;
  padding:1rem;
  margin-bottom:1rem;
}

.nav{
  display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;
}

button{
  padding:.45rem 1.2rem;
  border-radius:999px;
  border:none;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-size:.95rem;
}

button.secondary{background:#475569}
select{padding:.35rem;border-radius:6px}

.header-row{
  display:grid;
  grid-template-columns:360px 1fr;
  column-gap:2.5rem;
  border-bottom:3px solid #64748b;
  padding-bottom:.6rem;
  margin-bottom:.6rem;
  opacity:.8;
  letter-spacing:.08em;
}

.team{
  display:grid;
  grid-template-columns:360px 1fr;
  column-gap:2.5rem;
  align-items:center;
  padding:.9rem 0;
  border-top:3px solid #475569;
}

.team:first-child{border-top:none}

.team-name{
  font-size:1.4rem;
  font-weight:700;
  text-transform:uppercase;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  padding-right:1.5rem;
  border-right:3px solid #64748b;
}

.answer{
  padding-left:1.5rem;
  font-size:1.15rem;
}

.answer.hint{opacity:.6;font-style:italic}

.team.correct{background:#14532d}
.team.partial{background:#713f12}
.team.wrong{background:#7f1d1d}

.solution{
  font-size:1.7rem;
  font-weight:800;
  text-align:center;
  margin:1rem 0;
  color:#22c55e;
}
</style>
</head>

<body>

<h1>🎤 Hitster – Host‑Modus</h1>
<div class="hint">Rundeweise Auflösung · Antworten → Lösung → Bewertung</div>

<div class="section">
  <div class="nav">
    <button id="round1Btn">🎵 Hitster – Klassik</button>
    <button id="round2Btn">🎬 Filmmusik</button>

    Song:
    <select id="songSelect"></select>

    <button id="showAnswersBtn" class="secondary">👀 Antworten anzeigen</button>
    <button id="showSolutionBtn" class="secondary">✅ Richtige Antwort anzeigen</button>
  </div>
</div>

<div id="solutionBox" class="solution" style="display:none;"></div>

<div class="section">
  <div class="header-row">
    <div>TEAM</div>
    <div>ANTWORT</div>
  </div>
  <div id="answersContainer"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

const supabaseClient=window.supabase.createClient(
  "https://havaoqxnxnlmyfbldyic.supabase.co",
  "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
);

const songCounts={1:15,2:16};
let round=1,song=1;
let teams=[],answers=[];
let answersVisible=false;
let solutionVisible=false;

/* ---------- Lösungen ---------- */
const solutions={
  2:{
    1:["forrest gump"],
    2:["8 mile","eight mile"],
    3:["amelie","fabelhafte welt der amelie"],
    4:["harry potter","hedwigs theme"],
    5:["godfather","pate"],
    6:["fight club"],
    7:["ziemlich beste freunde"],
    8:["interstellar"],
    9:["schindlers liste"],
    10:["inception"],
    11:["the office"],
    12:["requiem for a dream"],
    13:["chariots of fire","stunde des siegers"],
    14:["batman begins"],
    15:["barbie"],
    16:["sherlock holmes"]
  }
};

const normalize=s=>(s||"")
  .toLowerCase()
  .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
  .replace(/[^a-z0-9]/g,"");

function similarity(a,b){
 if(!a||!b) return 0;
 let m=0;
 for(let i=0;i<Math.min(a.length,b.length);i++)
  if(a[i]===b[i]) m++;
 return m/Math.max(a.length,b.length);
}

function classify(score){
 if(score>=0.85) return"correct";
 if(score>=0.6) return"partial";
 return"wrong";
}

/* ---------- Daten ---------- */
async function refreshData(){
 teams=(await supabaseClient.from("teams").select("*").order("created_at")).data||[];
 answers=(await supabaseClient.from("answers").select("*")).data||[];
 render();
}

/* ---------- UI ---------- */
function resetView(){
 answersVisible=false;
 solutionVisible=false;
 solutionBox.style.display="none";
 render();
}

function populateSongs(){
 songSelect.innerHTML="";
 for(let i=1;i<=songCounts[round];i++)
  songSelect.innerHTML+=`<option value="${i}">Song ${i}</option>`;
 song=1;
}

function render(){
 answersContainer.innerHTML="";
 teams.forEach(team=>{
  const row=document.createElement("div");
  row.className="team";

  const ans=answers.find(a=>a.team_id===team.id&&a.round===round&&a.song===song);

  row.innerHTML=`<div class="team-name">${team.name}</div>`;

  if(!answersVisible){
    row.innerHTML+=`<div class="answer hint"></div>`;
  } else if(!ans){
    row.innerHTML+=`<div class="answer hint">Keine Antwort</div>`;
  } else if(!solutionVisible){
    row.innerHTML+=`<div class="answer">${ans.movie}</div>`;
  } else {
    const solList=solutions[round]?.[song]||[];
    const score=Math.max(...solList.map(s=>similarity(normalize(ans.movie),normalize(s))));
    const cls=classify(score);
    row.classList.add(cls);
    row.innerHTML+=`<div class="answer">${ans.movie}</div>`;
  }

  answersContainer.appendChild(row);
 });
}

/* ---------- Events ---------- */
round2Btn.onclick=()=>{round=2;populateSongs();resetView();}
round1Btn.onclick=()=>{round=1;populateSongs();resetView();}

songSelect.onchange=e=>{song=Number(e.target.value);resetView();}
showAnswersBtn.onclick=()=>{answersVisible=true;render();}
showSolutionBtn.onclick=()=>{
 const sol=solutions[round]?.[song];
 if(!sol) return;
 solutionBox.textContent=sol[0];
 solutionBox.style.display="block";
 solutionVisible=true;
 render();
};

/* ---------- Start ---------- */
populateSongs();
refreshData();

});
</script>

</body>
</html>
