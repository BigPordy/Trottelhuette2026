<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hitster – Host‑Modus</title>

  <!-- =======================
       SUPABASE SCRIPT
       BEGIN
       ======================= -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <!-- =======================
       SUPABASE SCRIPT
       ENDE
       ======================= -->

  <style>
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, sans-serif;
      background: #020617;
      color: white;
    }

    .section {
      background: #1f2937;
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .nav {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    button {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
    }

    select {
      padding: 0.3rem;
      border-radius: 6px;
      border: none;
    }

    .team {
      border-top: 1px solid #334155;
      padding-top: 0.75rem;
      margin-top: 0.75rem;
    }

    .team-name {
      font-weight: bold;
    }

    .answer {
      margin-left: 0.5rem;
      opacity: 0.9;
    }

    .hint {
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<h1>🎤 Hitster – Host‑Modus</h1>
<div class="hint">E1 – neutrale Antwortanzeige</div>

<div class="section">
  <div class="nav">
    <button id="r1Btn">🎵 Runde 1</button>
    <button id="r2Btn">🎬 Runde 2</button>
    Song:
    <select id="songSelect"></select>
  </div>
</div>

<div class="section">
  <h2>Antworten</h2>
  <div id="answersContainer"></div>
</div>

<script>
/* =======================
   APP START
   BEGIN
   ======================= */
document.addEventListener("DOMContentLoaded", () => {

  /* =======================
     SUPABASE CLIENT
     BEGIN
     ======================= */
  const supabaseClient = window.supabase.createClient(
    "https://havaoqxnxnlmyfbldyic.supabase.co",
    "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
  );
  /* =======================
     SUPABASE CLIENT
     ENDE
     ======================= */

  /* =======================
     STATE
     BEGIN
     ======================= */
  const songCounts = { 1: 15, 2: 16 };
  let round = 1;
  let song = 1;
  let teams = [];
  let answersData = [];
  /* =======================
     STATE
     ENDE
     ======================= */

  async function refreshData() {
    teams = (await supabaseClient
      .from("teams")
      .select("*")
      .order("created_at", { ascending: true })
    ).data || [];

    answersData = (await supabaseClient
      .from("answers")
      .select("*")
    ).data || [];

    render();
  }

  function render() {
    const container = document.getElementById("answersContainer");
    container.innerHTML = "";

    teams.forEach(team => {
      const block = document.createElement("div");
      block.className = "team";
      block.innerHTML = `<div class="team-name">${team.name}</div>`;

      const ans = answersData.find(a =>
        a.team_id === team.id &&
        a.round === round &&
        a.song === song
      );

      if (ans) {
        block.innerHTML +=
          round === 1
            ? `<div class="answer">${ans.artist} – ${ans.title}</div>`
            : `<div class="answer">${ans.movie}</div>`;
      } else {
        block.innerHTML += `<div class="answer hint">Keine Antwort</div>`;
      }

      container.appendChild(block);
    });
  }

  function populateSongs() {
    const select = document.getElementById("songSelect");
    select.innerHTML = "";
    for (let i = 1; i <= songCounts[round]; i++) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = `Song ${i}`;
      select.appendChild(opt);
    }
    song = 1;
  }

  document.getElementById("r1Btn").onclick = () => {
    round = 1;
    populateSongs();
    refreshData();
  };

  document.getElementById("r2Btn").onclick = () => {
    round = 2;
    populateSongs();
    refreshData();
  };

  document.getElementById("songSelect").onchange = e => {
    song = Number(e.target.value);
    render();
  };

  populateSongs();
  refreshData();
});
/* =======================
   APP START
   ENDE
   ======================= */
</script>

</body>
</html>
