<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hitster – Host‑Modus</title>

  <!-- =======================
       SUPABASE CLIENT
       BEGIN
       ======================= -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <!-- =======================
       SUPABASE CLIENT
       ENDE
       ======================= -->

  <style>
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, sans-serif;
      background: #020617;
      color: white;
    }

    .section {
      background: #1f2937;
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .nav {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    button {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
    }

    button.secondary { background: #475569; }
    button.good { background: #16a34a; }
    button.mid { background: #eab308; }
    button.bad { background: #dc2626; }

    select { padding: 0.3rem; border-radius: 6px; }

    .team {
      border-top: 1px solid #334155;
      padding-top: 0.75rem;
      margin-top: 0.75rem;
    }

    .answer { margin-left: 0.5rem; font-size: 0.9rem; }
    .hint { font-size: 0.8rem; opacity: 0.75; }

    .locked button.eval { pointer-events: none; opacity: 0.4; }
    .score { font-weight: bold; }
  </style>
</head>

<body>

<h1>🎤 Hitster – Host‑Modus</h1>
<div class="hint" id="lockStatus">🟢 Bewertung aktiv</div>

<div class="section">
  <div class="nav">
    <button onclick="setRound(1)">🎵 Runde 1</button>
    <button onclick="setRound(2)">🎬 Runde 2</button>

    Song:
    <select id="songSelect" onchange="render()"></select>

    <!-- =======================
         D1 – LOCK
         BEGIN
         ======================= -->
    <button id="lockBtn" class="secondary" onclick="toggleLock()">🔒 Sperren</button>
    <!-- =======================
         D1 – LOCK
         ENDE
         ======================= -->
  </div>
</div>

<div class="section" id="answersSection">
  <h2>Antworten</h2>
  <div id="answers"></div>
</div>

<div class="section">
  <h2>🏆 Leaderboard</h2>
  <div id="leaderboard"></div>
</div>

<script>
/* =======================
   SUPABASE INIT
   BEGIN
   ======================= */
const supabase = window.supabase.createClient(
  "https://havaoqxnxnlmyfbldyic.supabase.co",
  "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
);
/* =======================
   SUPABASE INIT
   ENDE
   ======================= */

/* =======================
   STATE
   BEGIN
   ======================= */
const songCounts = { 1: 15, 2: 16 };
let round = 1, song = 1;
let teams = [], answers = [];
let scores = {};
let isLocked = false;
/* =======================
   STATE
   ENDE
   ======================= */

/* =======================
   DATA + REALTIME
   BEGIN
   ======================= */
async function refreshData() {
  teams = (await supabase.from("teams").select()).data || [];
  answers = (await supabase.from("answers").select()).data || [];
  render();
}

function subscribeRealtime() {
  supabase.channel("host-rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"teams"},refreshData)
    .on("postgres_changes",{event:"*",schema:"public",table:"answers"},refreshData)
    .subscribe();
}
/* =======================
   DATA + REALTIME
   ENDE
   ======================= */

/* =======================
   D1 – LOCK LOGIK
   BEGIN
   ======================= */
function toggleLock() {
  isLocked = !isLocked;
  answersSection.classList.toggle("locked", isLocked);
  lockStatus.textContent = isLocked ? "🔒 Bewertung gesperrt" : "🟢 Bewertung aktiv";
  lockBtn.textContent = isLocked ? "🔓 Freigeben" : "🔒 Sperren";
}
/* =======================
   D1 – LOCK LOGIK
   ENDE
   ======================= */

/* =======================
   UI
   BEGIN
   ======================= */
function setRound(r) {
  round = r;
  songSelect.innerHTML = "";
  for (let i=1;i<=songCounts[r];i++)
    songSelect.innerHTML += `<option value="${i}">Song ${i}</option>`;
  song = 1;
  render();
}

function render() {
  song = Number(songSelect.value);
  answers.innerHTML = "";
  scores = {};

  teams.forEach(t => {
    const div = document.createElement("div");
    div.className = "team";
    div.innerHTML = `<h3>${t.name}</h3>`;

    const ans = answersData = answers.find(a =>
      a.team_id === t.id && a.round === round && a.song === song
    );

    scores[t.id] = scores[t.id] || 0;

    if (!ans) {
      div.innerHTML += `<div class="answer">Keine Antwort</div>`;
      answers.appendChild(div);
      return;
    }

    if (round === 1) {
      div.innerHTML += `
        <div class="answer">${ans.artist} – ${ans.title}</div>
        <div class="nav">
          <button class="eval good" onclick="setScore('${t.id}',3)">✅ Alles richtig</button>
          <button class="eval mid" onclick="setScore('${t.id}',1)">◐ Teilweise</button>
          <button class="eval bad" onclick="setScore('${t.id}',0)">❌ Falsch</button>
        </div>
      `;
    } else {
      div.innerHTML += `
        <div class="answer">${ans.movie}</div>
        <div class="nav">
          <button class="eval good" onclick="setScore('${t.id}',2)">✅ Richtig</button>
          <button class="eval bad" onclick="setScore('${t.id}',0)">❌ Falsch</button>
        </div>
      `;
    }

    answers.appendChild(div);
  });

  renderLeaderboard();
}

function setScore(teamId, value) {
  scores[teamId] = value;
  renderLeaderboard();
}

function renderLeaderboard() {
  leaderboard.innerHTML = "";
  Object.entries(scores)
    .map(([id,score]) => ({ team: teams.find(t=>t.id===id)?.name, score }))
    .sort((a,b)=>b.score-a.score)
    .forEach(t =>
      leaderboard.innerHTML += `<div class="score">${t.team}: ${t.score}</div>`
    );
}
/* =======================
   UI
   ENDE
   ======================= */

/* =======================
   START
   BEGIN
   ======================= */
refreshData().then(subscribeRealtime);
setRound(1);
/* =======================
   START
   ENDE
   ======================= */
</script>

</body>
</html>
``
