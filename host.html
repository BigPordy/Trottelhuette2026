<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hitster – Host‑Modus</title>

  <!-- =======================
       SUPABASE SCRIPT
       BEGIN
       ======================= -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <!-- =======================
       SUPABASE SCRIPT
       ENDE
       ======================= -->

  <style>
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, sans-serif;
      background: #020617;
      color: white;
    }

    h1 { margin-bottom: 0.25rem; }

    .hint {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-bottom: 1rem;
    }

    .section {
      background: #1f2937;
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .nav {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    button {
      padding: 0.45rem 1.2rem;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 0.95rem;
    }

    button.secondary {
      background: #475569;
    }

    select {
      padding: 0.35rem;
      border-radius: 6px;
      border: none;
      font-size: 0.95rem;
    }

    /* =======================
       TEAM- / ANTWORT-LAYOUT
       BEGIN
       ======================= */
    .team {
      display: grid;
      grid-template-columns: 340px 1fr; /* weiter nach rechts */
      column-gap: 2.5rem;
      align-items: center;
      border-top: 1px solid #334155;
      padding: 0.9rem 0;
    }

    .team-name {
      font-size: 1.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .answer {
      font-size: 1.2rem;
      opacity: 0.95;
    }

    .answer.hint {
      opacity: 0.55;
      font-style: italic;
    }

    .answer.correct {
      color: #22c55e;
      font-weight: 700;
    }

    .answer.wrong {
      color: #ef4444;
      font-weight: 700;
    }

    .solution {
      font-size: 1.7rem;
      font-weight: 800;
      text-align: center;
      margin: 1rem 0;
      color: #22c55e;
    }
    /* =======================
       TEAM- / ANTWORT-LAYOUT
       ENDE
       ======================= */
  </style>
</head>

<body>

<h1>🎤 Hitster – Host‑Modus</h1>
<div class="hint">Phase E3 · Lösung anzeigen → Antworten grün / rot</div>

<!-- =======================
     NAVIGATION
     BEGIN
     ======================= -->
<div class="section">
  <div class="nav">
    <button id="round1Btn">🎵 Runde 1</button>
    <button id="round2Btn">🎬 Runde 2</button>

    Song:
    <select id="songSelect"></select>

    <button id="solutionBtn" class="secondary">✅ Lösung anzeigen</button>
  </div>
</div>
<!-- =======================
     NAVIGATION
     ENDE
     ======================= -->

<!-- =======================
     LÖSUNG
     BEGIN
     ======================= -->
<div id="solutionBox" class="solution" style="display:none;"></div>
<!-- =======================
     LÖSUNG
     ENDE
     ======================= -->

<!-- =======================
     ANTWORTEN
     BEGIN
     ======================= -->
<div class="section">
  <h2>Antworten</h2>
  <div id="answersContainer"></div>
</div>
<!-- =======================
     ANTWORTEN
     ENDE
     ======================= -->

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* =======================
     SUPABASE CLIENT
     BEGIN
     ======================= */
  const supabaseClient = window.supabase.createClient(
    "https://havaoqxnxnlmyfbldyic.supabase.co",
    "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
  );
  /* =======================
     SUPABASE CLIENT
     ENDE
     ======================= */

  /* =======================
     STATE
     BEGIN
     ======================= */
  const songCounts = { 1: 15, 2: 16 };
  let round = 1;
  let song = 1;
  let teams = [];
  let answers = [];
  let solutionVisible = false;
  /* =======================
     STATE
     ENDE
     ======================= */

  /* =======================
     OFFIZIELLE LÖSUNGEN
     BEGIN
     ======================= */
  const solutions = {
    1: {
      1: { artist: "beethoven", title: "fuer elise" },
      2: { artist: "vivaldi", title: "fruehling" }
    },
    2: {
      1: "forrest gump",
      2: "8 mile"
    }
  };
  /* =======================
     OFFIZIELLE LÖSUNGEN
     ENDE
     ======================= */

  const normalize = s =>
    (s || "").toLowerCase().replace(/[^a-z0-9]/g, "");

  async function refreshData() {
    teams = (await supabaseClient
      .from("teams")
      .select("*")
      .order("created_at", { ascending: true })
    ).data || [];

    answers = (await supabaseClient
      .from("answers")
      .select("*")
    ).data || [];

    render();
  }

  function populateSongs() {
    const sel = document.getElementById("songSelect");
    sel.innerHTML = "";
    for (let i = 1; i <= songCounts[round]; i++) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = `Song ${i}`;
      sel.appendChild(opt);
    }
    song = 1;
  }

  function render() {
    const container = document.getElementById("answersContainer");
    container.innerHTML = "";

    teams.forEach(team => {
      const row = document.createElement("div");
      row.className = "team";

      row.innerHTML = `<div class="team-name">${team.name}</div>`;

      const ans = answers.find(a =>
        a.team_id === team.id &&
        a.round === round &&
        a.song === song
      );

      let answerHtml = "";

      if (!ans) {
        answerHtml = `<div class="answer hint">Keine Antwort</div>`;
      } else if (!solutionVisible) {
        answerHtml = round === 1
          ? `<div class="answer">${ans.artist} – ${ans.title}</div>`
          : `<div class="answer">${ans.movie}</div>`;
      } else {
        let correct = false;

        if (round === 1) {
          const sol = solutions[1][song];
          correct =
            normalize(ans.artist).includes(sol.artist) &&
            normalize(ans.title).includes(sol.title);
        } else {
          correct =
            normalize(ans.movie).includes(normalize(solutions[2][song]));
        }

        answerHtml = `<div class="answer ${correct ? "correct" : "wrong"}">
          ${round === 1 ? `${ans.artist} – ${ans.title}` : ans.movie}
        </div>`;
      }

      row.innerHTML += answerHtml;
      container.appendChild(row);
    });
  }

  function showSolution() {
    const box = document.getElementById("solutionBox");
    const sol =
      round === 1
        ? solutions[1][song]
          ? `${solutions[1][song].artist} – ${solutions[1][song].title}`
          : null
        : solutions[2][song];

    if (!sol) return;

    box.textContent = `Lösung: ${sol}`;
    box.style.display = "block";
    solutionVisible = true;
    render();
  }

  function hideSolution() {
    solutionVisible = false;
    document.getElementById("solutionBox").style.display = "none";
  }

  /* =======================
     EVENT BINDINGS
     BEGIN
     ======================= */
  document.getElementById("round1Btn").addEventListener("click", () => {
    round = 1;
    hideSolution();
    populateSongs();
    render();
  });

  document.getElementById("round2Btn").addEventListener("click", () => {
    round = 2;
    hideSolution();
    populateSongs();
    render();
  });

  document.getElementById("songSelect").addEventListener("change", e => {
    song = Number(e.target.value);
    hideSolution();
    render();
  });

  document.getElementById("solutionBtn").addEventListener("click", showSolution);
  /* =======================
     EVENT BINDINGS
     ENDE
     ======================= */

  populateSongs();
  refreshData();
});
</script>

</body>
</html>
