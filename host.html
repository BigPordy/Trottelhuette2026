<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hitster – Host‑Modus</title>

  <!-- KORREKTER Supabase-Import -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, sans-serif;
      background: #020617;
      color: white;
    }

    h1 { margin: 0.2rem 0; }
    .hint { opacity: 0.7; margin-bottom: 1rem; }

    .section {
      background: #1f2937;
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .nav {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      padding: 0.45rem 1.2rem;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button.secondary { background: #475569; }
    button.active { background: #16a34a; }
    select { padding: 0.35rem; border-radius: 6px; }

    .header-row, .team {
      display: grid;
      grid-template-columns: 360px 1fr;
      column-gap: 2.5rem;
    }

    .header-row {
      border-bottom: 3px solid #64748b;
      opacity: 0.8;
      padding-bottom: 0.6rem;
      margin-bottom: 0.6rem;
    }

    .team {
      padding: 0.9rem 0;
      border-top: 3px solid #475569;
    }

    .team:first-child { border-top: none; }

    .team-name {
      font-size: 1.4rem;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 1.5rem;
      border-right: 3px solid #64748b;
    }

    .answer { padding-left: 1.5rem; font-size: 1.15rem; }
    .answer.hint { opacity: 0.6; font-style: italic; }

    .solution {
      font-size: 1.7rem;
      font-weight: 800;
      text-align: center;
      margin: 1rem 0;
      color: #22c55e;
    }

    .scoreboard .row {
      display: grid;
      grid-template-columns: 1fr auto;
      border-bottom: 2px solid #334155;
      padding: 0.6rem 1rem;
    }

    .scoreboard .gold {
      background: linear-gradient(135deg,#8f7a00,#d4af37,#bfa200);
      color: #1a1a1a;
      font-weight: 800;
    }

    .hidden { display: none; }
  </style>
</head>

<body>

<h1>🎤 Hitster – Host‑Modus</h1>
<div class="hint">Antworten → Lösung → Bewertung → Zwischenstand</div>

<div class="section nav">
  <button id="r1" class="active">🎵 Hitster – Klassik</button>
  <button id="r2">🎬 Filmmusik</button>
  Song:
  <select id="songSelect"></select>
  <button id="showAnswers" class="secondary">👀 Antworten anzeigen</button>
  <button id="showSolution" class="secondary">✅ Richtige Antwort anzeigen</button>
  <button id="showScoreBtn" class="secondary">🏆 Zwischenstand anzeigen</button>
</div>

<div id="solutionBox" class="solution hidden"></div>

<div id="roundView" class="section">
  <div class="header-row">
    <div>TEAM</div>
    <div>ANTWORT</div>
  </div>
  <div id="answers"></div>
</div>

<div id="scoreView" class="section hidden">
  <h2>🏆 Zwischenstand</h2>
  <div id="scoreboard" class="scoreboard"></div>
  <button id="backBtn" class="secondary">⬅ Zurück zum Spiel</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const supabase = window.supabase.createClient(
    "https://havaoqxnxnlmyfbldyic.supabase.co",
    "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
  );

  const r1 = document.getElementById("r1");
  const r2 = document.getElementById("r2");
  const songSelect = document.getElementById("songSelect");
  const showAnswers = document.getElementById("showAnswers");
  const showSolution = document.getElementById("showSolution");
  const showScoreBtn = document.getElementById("showScoreBtn");
  const backBtn = document.getElementById("backBtn");

  const roundView = document.getElementById("roundView");
  const scoreView = document.getElementById("scoreView");
  const answersEl = document.getElementById("answers");
  const solutionBox = document.getElementById("solutionBox");
  const scoreboard = document.getElementById("scoreboard");

  const songCounts = { 1: 15, 2: 16 };
  let round = 1;
  let song = 1;
  let teams = [];
  let answersData = [];
  let answersVisible = false;
  let scores = {};

  const solutions = {
    1: {
      1: { disp: "Ludwig van Beethoven – Für Elise" }
    },
    2: {
      1: { disp: "Forrest Gump" }
    }
  };

  async function load() {
    teams = (await supabase.from("teams").select("*").order("created_at")).data || [];
    answersData = (await supabase.from("answers").select("*")).data || [];
    teams.forEach(t => scores[t.id] = scores[t.id] || 0);
    render();
  }

  function populateSongs() {
    songSelect.innerHTML = "";
    for (let i = 1; i <= songCounts[round]; i++) {
      songSelect.innerHTML += `<option value="${i}">Song ${i}</option>`;
    }
    song = 1;
  }

  function render() {
    answersEl.innerHTML = "";
    teams.forEach(team => {
      const row = document.createElement("div");
      row.className = "team";
      row.innerHTML = `<div class="team-name">${team.name}</div>`;
      const a = answersData.find(x => x.team_id === team.id && x.round === round && x.song === song);

      if (!answersVisible) {
        row.innerHTML += `<div class="answer hint"></div>`;
      } else if (!a) {
        row.innerHTML += `<div class="answer hint">Keine Antwort</div>`;
      } else {
        row.innerHTML += `<div class="answer">${round === 1 ? a.artist + " – " + a.title : a.movie}</div>`;
      }
      answersEl.appendChild(row);
    });
  }

  function showSolutionNow() {
    solutionBox.textContent = solutions[round][song]?.disp || "";
    solutionBox.classList.remove("hidden");
  }

  function openScoreboard() {
    roundView.classList.add("hidden");
    scoreView.classList.remove("hidden");
    scoreboard.innerHTML = "";
    const sorted = [...teams].sort((a, b) => scores[b.id] - scores[a.id]);
    sorted.forEach((t, i) => {
      const div = document.createElement("div");
      div.className = "row";
      if (i === sorted.length - 1) div.classList.add("gold");
      div.innerHTML = `
        <span>${i + 1}. ${t.name}</span>
        <span>${i === sorted.length - 1 ? "🏆 Dummenpärchen 2026" : scores[t.id] + " Punkte"}</span>
      `;
      scoreboard.appendChild(div);
    });
  }

  r1.onclick = () => { round = 1; populateSongs(); answersVisible = false; solutionBox.classList.add("hidden"); render(); };
  r2.onclick = () => { round = 2; populateSongs(); answersVisible = false; solutionBox.classList.add("hidden"); render(); };
  songSelect.onchange = () => { answersVisible = false; solutionBox.classList.add("hidden"); render(); };
  showAnswers.onclick = () => { answersVisible = true; render(); };
  showSolution.onclick = showSolutionNow;
  showScoreBtn.onclick = openScoreboard;
  backBtn.onclick = () => { scoreView.classList.add("hidden"); roundView.classList.remove("hidden"); };

  populateSongs();
  load();
});
</script>

</body>
</html>
