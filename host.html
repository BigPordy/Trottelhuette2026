<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<title>Hitster – Host Live</title>

<style>
body { background:#020617; color:white; font-family:system-ui; padding:1rem; }
.card { background:#1f2937; padding:1rem; border-radius:12px; margin-bottom:1rem; }
</style>
</head>

<body>

<h1>🎤 Host‑Modus (LIVE)</h1>
<div id="content"></div>

<script>
const supabase = supabase.createClient(
  "https://havaoqxnxnlmyfbldyic.supabase.co",
  "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
);

async function load() {
  const { data: teams } = await supabase.from("teams").select("*");
  const { data: answers } = await supabase.from("answers").select("*");

  content.innerHTML = "";

  teams.forEach(t => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<h3>${t.name}</h3>`;

    answers
      .filter(a => a.team_id === t.id)
      .forEach(a => {
        div.innerHTML += `<p>R${a.round} | Song ${a.song}: 
          ${a.artist || ""} ${a.title || ""} ${a.movie || ""}</p>`;
      });

    content.appendChild(div);
  });
}

load();
supabase.channel("live")
  .on("postgres_changes", { event: "*", schema: "public", table: "answers" }, load)
  .subscribe();
</script>

</body>
</html>
