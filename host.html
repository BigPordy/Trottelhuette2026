<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hitster – Host‑Modus</title>

  <!-- =======================
       SUPABASE SCRIPT
       BEGIN
       ======================= -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <!-- =======================
       SUPABASE SCRIPT
       ENDE
       ======================= -->

  <style>
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, sans-serif;
      background: #020617;
      color: white;
    }

    h1 { margin-bottom: 0.25rem; }
    h2 { margin-top: 0; }

    .hint {
      opacity: 0.7;
      margin-bottom: 1rem;
    }

    .section {
      background: #1f2937;
      border-radius: 14px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .nav {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    button {
      padding: 0.45rem 1.2rem;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 0.95rem;
    }

    button.secondary {
      background: #475569;
    }

    select {
      padding: 0.35rem;
      border-radius: 6px;
      border: none;
      font-size: 0.95rem;
    }

    /* =======================
       TEAM / ANSWER LAYOUT
       BEGIN
       ======================= */
    .team {
      display: grid;
      grid-template-columns: 360px 1fr;
      column-gap: 2.5rem;
      align-items: center;
      border-top: 1px solid #334155;
      padding: 0.9rem 0;
    }

    .team-name {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .answer {
      font-size: 1.2rem;
    }

    .answer.correct { color: #22c55e; font-weight: 700; }
    .answer.partial { color: #eab308; font-weight: 700; }
    .answer.wrong   { color: #ef4444; font-weight: 700; }
    .answer.hint    { opacity: 0.6; font-style: italic; }

    .solution {
      font-size: 1.7rem;
      font-weight: 800;
      text-align: center;
      margin: 1rem 0;
      color: #22c55e;
    }
    /* =======================
       TEAM / ANSWER LAYOUT
       ENDE
       ======================= */
  </style>
</head>

<body>

<h1>🎤 Hitster – Host‑Modus</h1>
<div class="hint">Runde 1: <b>Hitster – Klassik</b> · Lösung anzeigen → Grün / Gelb / Rot</div>

<!-- =======================
     NAVIGATION
     BEGIN
     ======================= -->
<div class="section">
  <div class="nav">
    <button id="round1Btn">🎵 Hitster – Klassik</button>
    <button id="round2Btn">🎬 Filmmusik</button>

    Song:
    <select id="songSelect"></select>

    <button id="solutionBtn" class="secondary">✅ Lösung anzeigen</button>
  </div>
</div>
<!-- =======================
     NAVIGATION
     ENDE
     ======================= -->

<div id="solutionBox" class="solution" style="display:none;"></div>

<div class="section">
  <h2>Antworten</h2>
  <div id="answersContainer"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* =======================
     SUPABASE CLIENT
     BEGIN
     ======================= */
  const supabaseClient = window.supabase.createClient(
    "https://havaoqxnxnlmyfbldyic.supabase.co",
    "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
  );
  /* =======================
     SUPABASE CLIENT
     ENDE
     ======================= */

  /* =======================
     STATE
     BEGIN
     ======================= */
  const songCounts = { 1: 15, 2: 16 };
  let round = 1;
  let song = 1;
  let teams = [];
  let answers = [];
  let solutionVisible = false;
  /* =======================
     STATE
     ENDE
     ======================= */

  /* =======================
     HILFSFUNKTIONEN
     BEGIN
     ======================= */
  const normalize = s =>
    (s || "")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9]/g, "");

  function similarity(a, b) {
    if (!a || !b) return 0;
    let m = 0;
    for (let i = 0; i < Math.min(a.length, b.length); i++) {
      if (a[i] === b[i]) m++;
    }
    return m / Math.max(a.length, b.length);
  }

  function classify(score) {
    if (score >= 0.85) return "correct";
    if (score >= 0.6)  return "partial";
    return "wrong";
  }
  /* =======================
     HILFSFUNKTIONEN
     ENDE
     ======================= */

  /* =======================
     EXPLIZITE LÖSUNGEN
     RUNDE 1 – HITSTER KLASSIK
     BEGIN
     ======================= */
  const solutions = {
    1: {
      1: { composer:["ludwig van beethoven"], title:["fur elise","fuer elise"], display:"Ludwig van Beethoven – Für Elise" },
      2: { composer:["antonio vivaldi"], title:["der fruhling","fruhling","la primavera"], display:"Antonio Vivaldi – Der Frühling" },
      3: { composer:["wolfgang amadeus mozart"], title:["hochzeit des figaro","overture"], display:"W. A. Mozart – Hochzeit des Figaro (Ouvertüre)" },
      4: { composer:["giuseppe verdi"], title:["la donna e mobile","donna e mobile"], display:"Giuseppe Verdi – La donna è mobile" },
      5: { composer:["pjotr iljitsch tschaikowski"], title:["schwanensee"], display:"Tschaikowski – Schwanensee" },
      6: { composer:["richard wagner"], title:["ritt der walkuren"], display:"Richard Wagner – Ritt der Walküren" },
      7: { composer:["ludwig van beethoven"], title:["5 symphonie","schicksalssymphonie"], display:"Beethoven – 5. Symphonie" },
      8: { composer:["johann sebastian bach"], title:["air"], display:"J. S. Bach – Air" },
      9: { composer:["wolfgang amadeus mozart"], title:["eine kleine nachtmusik"], display:"Mozart – Eine kleine Nachtmusik" },
      10:{ composer:["johann pachelbel"], title:["kanon","kanon in d"], display:"Pachelbel – Kanon in D" },
      11:{ composer:["wolfgang amadeus mozart"], title:["rondo alla turca","turkischer marsch"], display:"Mozart – Rondo alla Turca" },
      12:{ composer:["carl orff"], title:["o fortuna","carmina burana"], display:"Carl Orff – O Fortuna" },
      13:{ composer:["georges bizet"], title:["carmen"], display:"Georges Bizet – Carmen" },
      14:{ composer:["edvard grieg"], title:["morgenstimmung"], display:"Edvard Grieg – Morgenstimmung" },
      15:{ composer:["johann strauss"], title:["an der schonen blauen donau"], display:"Johann Strauss II – An der schönen blauen Donau" }
    }
  };
  /* =======================
     EXPLIZITE LÖSUNGEN
     ENDE
     ======================= */

  async function refreshData() {
    teams = (await supabaseClient.from("teams").select("*").order("created_at")).data || [];
    answers = (await supabaseClient.from("answers").select("*")).data || [];
    render();
  }

  function populateSongs() {
    const sel = document.getElementById("songSelect");
    sel.innerHTML = "";
    for (let i = 1; i <= songCounts[round]; i++) {
      sel.innerHTML += `<option value="${i}">Song ${i}</option>`;
    }
    song = 1;
  }

  function render() {
    const container = document.getElementById("answersContainer");
    container.innerHTML = "";

    teams.forEach(team => {
      const row = document.createElement("div");
      row.className = "team";
      row.innerHTML = `<div class="team-name">${team.name}</div>`;

      const ans = answers.find(a =>
        a.team_id === team.id && a.round === round && a.song === song
      );

      if (!ans) {
        row.innerHTML += `<div class="answer hint">Keine Antwort</div>`;
      } else if (!solutionVisible) {
        row.innerHTML += `<div class="answer">${ans.artist} – ${ans.title}</div>`;
      } else {
        const sol = solutions[round][song];
        const compScore = Math.max(...sol.composer.map(c => similarity(normalize(ans.artist), normalize(c))));
        const titleScore = Math.max(...sol.title.map(t => similarity(normalize(ans.title), normalize(t))));
        const cls = classify(Math.max(compScore, titleScore));
        row.innerHTML += `<div class="answer ${cls}">${ans.artist} – ${ans.title}</div>`;
      }
      container.appendChild(row);
    });
  }

  document.getElementById("round1Btn").onclick = () => {
    round = 1;
    solutionVisible = false;
    document.getElementById("solutionBox").style.display = "none";
    populateSongs();
    render();
  };

  document.getElementById("solutionBtn").onclick = () => {
    const sol = solutions[round][song];
    if (!sol) return;
    document.getElementById("solutionBox").textContent = "Lösung: " + sol.display;
    document.getElementById("solutionBox").style.display = "block";
    solutionVisible = true;
    render();
  };

  document.getElementById("songSelect").onchange = e => {
    song = Number(e.target.value);
    solutionVisible = false;
    document.getElementById("solutionBox").style.display = "none";
    render();
  };

  populateSongs();
  refreshData();
});
</script>

</body>
</html>
``
