<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Point on Earth – Team</title>

  <!-- Map Styles (z. B. Leaflet) kommen später -->
  map-team.css
  
  <link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  defer
></script>

<script src="map-team.js" defer></script>
  
</head>

<body>

  <!-- ================================ -->
  <!-- 📱 HEADER / RUNDENINFO -->
  <!-- ================================ -->
  <header id="teamHeader">
    <h1>🌍 Point on Earth</h1>

    <div id="roundInfo">
      <span id="roundCounter">Runde 1 von 8</span>
    </div>

    <div id="questionBox">
      <span id="questionText">
        Pinne: …
      </span>
    </div>
    <!-- ================================ -->
<!-- 🧑‍🤝‍🧑 TEAM-AUSWAHL -->
<!-- ================================ -->

<div id="teamSelectWrapper">
  <label for="teamSelect">Team auswählen:</label>
  <select id="teamSelect">
    <option value="">– bitte wählen –</option>
  </select>
</div>
  </header>


  <!-- ================================ -->
  <!-- 🗺️ KARTENBEREICH -->
  <!-- ================================ -->
  <main id="mapStage">

    <!-- Leerer Kartencontainer -->
    <div id="mapContainer">
      <!-- Karte wird hier eingebunden -->
    </div>

  </main>


  <!-- ================================ -->
  <!-- ✅ AKTIONS- / STATUSBEREICH -->
  <!-- ================================ -->
  <footer id="teamControls">

    <!-- Hinweis vor dem Pinnen -->
    <div id="pinHint">
      Tippe auf die Karte, um deinen Pin zu setzen.
    </div>

    <!-- Button: Pin absenden -->
    <button id="btnSubmitPin" class="hidden">
      Pin absenden
    </button>

    <!-- Status nach Absenden -->
    <div id="waitMessage" class="hidden">
      ✅ Pin gespeichert.<br />
      Bitte warte auf die Auflösung.
    </div>

  </footer>

</body>
</html>
