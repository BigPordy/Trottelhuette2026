<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Buzzer – Host</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: white;
      padding: 2rem;
    }
    .winner {
      margin-top: 2rem;
      font-size: 2rem;
      padding: 1.5rem;
      background: #14532d;
      border-radius: 12px;
    }
    #decisionBox button {
  font-size: 1.4rem;
  padding: 1rem 2rem;
  margin-right: 1rem;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#correctBtn {
  background: #16a34a;
  color: white;
}

#wrongBtn {
  background: #dc2626;
  color: white;
}
  </style>
</head>
<body>

<h1>🎛️ Buzzer – Host</h1>

<p>Status: <strong id="status">Warte auf Buzz …</strong></p>

<div id="winnerBox"></div>
<div id="decisionBox" style="display:none; margin-top:2rem;">
  <button id="correctBtn">✅ Richtig</button>
  <button id="wrongBtn">❌ Pech 300</button>
</div>

  
<script>
// Supabase + Channel
  const db = window.supabase.createClient(
  "https://havaoqxnxnlmyfbldyic.supabase.co",
  "sb_publishable_U-UsVeVHSjF0NXZeZ-D4wA_Ly4ZRgH5"
);
  
// ✅ Globaler Channel für Lock-Signale
const channel = db.channel("buzzer-state");
// DOM-Refs
const decisionBox = document.getElementById("decisionBox");
const correctBtn = document.getElementById("correctBtn");
const wrongBtn = document.getElementById("wrongBtn");
  
// TEMP: feste Frage (kommt später dynamisch)
const CURRENT_QUESTION_ID = 1;

  
// ✅ Nur der erste Buzz zählt
let winnerTeamId = null;
let blockedTeams = [];
  // Realtime-Handler
// ✅ EIN einziges Realtime-Abo auf buzz_events
db.channel("buzz-events")
  .on(
    "postgres_changes",
    {
      event: "INSERT",
      schema: "public",
      table: "buzz_events",
      filter: `question_id=eq.${CURRENT_QUESTION_ID}`
    },
    async (payload) => {

      // 🔒 Wenn bereits jemand gewonnen hat → ignorieren
      if (winnerTeamId) return;

      winnerTeamId = payload.new.team_id;
      document.getElementById("status").textContent = "Buzz empfangen";

      // ✅ Gewinner-Teamnamen laden
      const { data } = await db
        .from("teams")
        .select("name")
        .eq("id", winnerTeamId)
        .single();

      // ✅ Gewinner anzeigen
      document.getElementById("winnerBox").innerHTML = `
        <div class="winner">
          🔔 <strong>${data.name}</strong> hat zuerst gebuzzert!
        </div>
      `;
      decisionBox.style.display = "block";

      console.log("Erster Buzz von:", data.name);

      // ✅ GLOBALEN LOCK AN ALLE TEAMS SENDEN
      channel.send({
        type: "broadcast",
        event: "lock",
        payload: {
          winnerTeamId: winnerTeamId
        }
      });
    }
  )
  .subscribe();

correctBtn.onclick = () => {
  decisionBox.style.display = "none";
};

wrongBtn.onclick = () => {
  decisionBox.style.display = "none";
};
</script>


</body>
</html>
